# Reasonix configuration.
# Resolution order: flag > ./reasonix.toml > ~/.config/reasonix/config.toml > built-in defaults.
# Secrets come from the environment via api_key_env; never put keys here.

config_version = 2   # schema marker for diagnostics; old versions may ignore it
default_model = "deepseek-flash"
language      = "zh"   # ui/model language; empty = auto-detect from $LANG / $REASONIX_LANG

[network]
proxy_mode = "auto"   # auto|env|custom|off; auto currently uses env proxy
# proxy_url  = "socks5://127.0.0.1:7890"   # optional custom override
# no_proxy   = "localhost,127.0.0.1,.local"   # honored for proxy_mode = "custom"

[network.proxy]
type = "socks5"   # http|https|socks5|socks5h
# server = "127.0.0.1"
# port = 7890
# username = ""
# password = "${REASONIX_PROXY_PASSWORD}"   # optional; supports ${VAR} expansion

[agent]
# system_prompt = """..."""   # omit to use the built-in prompt for this version
system_prompt_file = "prompts/system.md"
max_steps         = 0   # executor tool-call rounds; 0 = no limit
planner_max_steps = 12   # planner read-only tool-call rounds; 0 = no limit
temperature       = 0.0
auto_plan   = "on"   # off|on; off keeps plan mode manual
# auto_plan_classifier = "deepseek-flash"   # optional; only used for borderline tasks
soft_compact_ratio  = 0.5   # notice only; keeps cache-first prefix intact
compact_ratio       = 0.8   # try compacting when prompt reaches this fraction
compact_force_ratio = 0.9   # force compacting at this high-water mark
# planner_model = "mimo"   # optional: enable two-model collaboration
# subagent_model = "deepseek-pro"   # optional default for runAs=subagent skills
# subagent_models = { review = "deepseek-pro", security_review = "deepseek-pro" }   # per-skill overrides
# subagent_effort = "high"   # optional default effort for subagents
# subagent_efforts = { review = "max", task = "high" }   # per-tool/skill effort overrides
output_style = "explanatory"   # persona/tone folded into the prompt

[[providers]]
name        = "deepseek-flash"
kind        = "openai"
base_url    = "https://api.deepseek.com"
models      = ["deepseek-v4-flash"]
default     = "deepseek-v4-flash"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"   # optional; wallet-balance endpoint shown in the status bar
context_window = 1000000   # tokens; compaction triggers near this limit
price       = { cache_hit = 0.02, input = 1, output = 2, currency = "¥" }   # per 1M tokens

[[providers]]
name        = "deepseek-pro"
kind        = "openai"
base_url    = "https://api.deepseek.com"
model       = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"
balance_url = "https://api.deepseek.com/user/balance"   # optional; wallet-balance endpoint shown in the status bar
context_window = 1000000   # tokens; compaction triggers near this limit
price       = { cache_hit = 0.025, input = 3, output = 6, currency = "¥" }   # per 1M tokens

[tools]
enabled = []   # empty = all built-in tools
bash_timeout_seconds = 120   # foreground safety cap; set 0 for no tool-local cap

[codegraph]
enabled      = true   # built-in MCP server; off by default for first-run sessions
auto_install = true   # fetch the runtime when CodeGraph is enabled but missing
# path       = ""   # empty = cache, then PATH, then a bundle beside reasonix

[lsp]
enabled = true   # language server tools; servers launch lazily when used

[lsp.servers.python]
command = "pyright"
extensions = [".py"]

[skills]
# paths = ["~/my-skills", "../shared/skills"]   # extra custom skill roots
# excluded_paths = ["~/.agents/skills"]   # hide convention roots without deleting folders
# max_depth = 3   # nested scan depth; set 1 for legacy root-only discovery
# disabled_skills = ["review"]   # hide noisy or unwanted skills

[permissions]
# Per-call gating. mode = writer fallback when no rule matches: ask|allow|deny.
# Readers always default to allow. Precedence: deny > ask > allow > fallback.
# Rules are "Tool" or "Tool(specifier)"; e.g. Bash(go test:*), Edit(src/**).
mode  = "allow"
deny = ["mcp__unity-mcp__*"]
allow = ["remember", "Edit", "Bash(python -m pytest tests/ -q 2>&1 && python -m mypy global_briefing.py fund_watch.py fund_utils.py fund_monitor.py fund_recommend.py config.py 2>&1)", "Bash(python global_briefing.py 2>&1)", "Bash(python fund_watch.py 2>&1)", "Bash(git add -A && git commit -m \"perf: 消除重复数据获取+重复推荐文件读取\n\n- global_briefing.py: 三个 builder 改为接受预取数据参数\n  main() 只做一次 get_a_share/get_global/_fetch_sentiment/_fetch_market_breadth\n  传入 build_briefing_md/text/html，减少约12个HTTP请求\n- fund_watch.py: main() 提前计算 compare_lines\n  终端输出和 push() 共用，不再重复读磁盘文件\" 2>&1 | Select-Object -Last 3)", "Bash(python -m pytest tests/ -q 2>&1 && python -m mypy fund_watch.py global_briefing.py fund_utils.py fund_monitor.py fund_recommend.py config.py 2>&1)", "Bash(git add -A && git commit -m \"refactor: 去掉终端输出 只保留推送通道\n\n项目核心目的: 自动推送金融报告到微信/邮件。\n终端print是开发调试残留，定时任务无人值守无需终端输出。\n- fund_watch.py main(): 删除 print(full_text) 和终端格式化代码\n- global_briefing.py main(): 删除 print(brief_text) 调用\" 2>&1 | Select-Object -Last 3)", "Bash(Get-ChildItem -Path:*)", "Bash(Get-ChildItem -Path \"C:\\Users\\1\\AppData\\Roaming\\reasonix\\projects\\D--Users-基金监控\\memory\\*.md\" | ForEach-Object {Write-Host \"=== $($_.Name) ===\"; Get-Content $_.FullName; Write-Host \"\"})", "forget", "task", "Bash(python -m pytest tests/ -q 2>&1)", "Bash(python -m mypy fund_watch.py fund_utils.py fund_monitor.py fund_recommend.py global_briefing.py config.py 2>&1)", "Bash(git add -A && git commit -m \"fix: 质量+安全审查修复汇总\n\n- d['m1']→d.get('m1') 用walrus防KeyError\n- _pipe_table_to_html 单元格加 html.escape\n- 腾讯K线 http→https\n- _parse_period_returns 注释标注天天基金变量名含义\n- fund_monitor.py 去未用import clear_cache\n- global_briefing.py 去未用import HISTORY_DIR/send_mail\" 2>&1 | Select-Object -Last 3)", "Bash(python -m mypy fund_watch.py fund_utils.py fund_monitor.py global_briefing.py fund_recommend.py config.py 2>&1)", "Bash(Write-Host \"=== 项目级 skill (.reasonix\\skills) ===\"; Get-ChildItem -Path \".reasonix\\skills\" -Directory -Name | % {Write-Host \"  $_\"}; Write-Host \"\"; Write-Host \"=== 全局级 skill (~/.reasonix/skills) ===\"; Get-ChildItem -Path \"$env:USERPROFILE\\.reasonix\\skills\" -Directory -Name | % {Write-Host \"  $_\"})", "Bash(python -c \"import tomllib; d=tomllib.load(open('reasonix.toml','rb')); print('system_prompt_file:', d['agent'].get('system_prompt_file','NOT SET'))\")", "Bash(python -c @'\nfrom fund_utils import fetch_bytes\nimport re\n\n# 新浪所有可能的全球指数代码格式\ntests = {\n    \"韩国KOSPI\": [\"gb_$ks11\",\"int_kospi\",\"int_ks11\",\"rt_kospi\",\"s_kospi\",\"kospi\"],\n    \"德国DAX\":   [\"gb_$gdaxi\",\"int_dax\",\"int_gdaxi\",\"rt_dax\",\"s_gdaxi\"],\n    \"法国CAC\":   [\"gb_$fchi\",\"int_cac\",\"int_fchi\",\"rt_cac\",\"s_fchi\"],\n    \"瑞士SMI\":   [\"gb_$ssmi\",\"int_smi\",\"int_ssmi\",\"rt_smi\",\"s_ssmi\"],\n}\n\nfor market, codes in tests.items():\n    print(f\"\\n{market}:\")\n    for code in codes:\n        try:\n            data = fetch_bytes(f\"https://hq.sinajs.cn/list={code}\", headers={\"User-Agent\":\"Mozilla/5.0\",\"Referer\":\"https://finance.sina.com.cn\"})\n            text = data.decode(\"gbk\")\n            m = re.search(r'\"(.+?)\"', text)\n            if m and m.group(1):\n                val = m.group(1)[:100]\n                print(f\"  ✅ {code}: {val}\")\n            else:\n                print(f\"  ❌ {code}: 空\")\n        except:\n            print(f\"  ❌ {code}: 错误\")\n'@)", "Bash(python -c @'\nfrom fund_utils import fetch_bytes\nimport re, urllib.request, json\n\n# 腾讯财经 - 全球指数代码\ntests = {\n    \"韩国KOSPI\": [\"int.kospi\",\"int.ks11\",\"gb_$ks11\",\"rt_kospi\"],\n    \"德国DAX\":   [\"int.dax\",\"int.gdaxi\",\"gb_$gdaxi\",\"rt_dax\"],\n    \"法国CAC\":   [\"int.cac\",\"int.fchi\",\"gb_$fchi\",\"rt_cac\"],\n    \"瑞士SMI\":   [\"int.smi\",\"int.ssmi\",\"gb_$ssmi\",\"rt_smi\"],\n}\n\nfor market, codes in tests.items():\n    print(f\"\\n{market}:\")\n    for code in codes:\n        url = f\"http://qt.gtimg.cn/q={code}\"\n        data = fetch_bytes(url, headers={\"User-Agent\":\"Mozilla/5.0\"})\n        text = data.decode(\"gbk\")\n        if \"v_\" in text and text.count(\"~\") > 3:\n            parts = text.split(\"~\")\n            name = parts[1] if len(parts) > 1 else \"?\"\n            price = parts[3] if len(parts) > 3 else \"?\"\n            chg = parts[32] if len(parts) > 32 else (\"?\" if len(parts) > 5 else \"?\")\n            print(f\"  ✅ {code}: {name} | {price} | {chg}\")\n        elif \"pv_none\" in text:\n            print(f\"  ❌ {code}: 无此代码\")\n        else:\n            print(f\"  ❌ {code}: {text[:60]}\")\n'@)", "Bash(python -c @'\nfrom fund_utils import fetch_bytes, fetch\nimport re, json, urllib.request\n\n# 尝试东方财富全球指数\ncodes = {\n    \"韩国KOSPI\": \"100.KOSPI\",\n    \"德国DAX\": \"100.GDAXI\",\n    \"法国CAC\": \"100.FCHI\",\n    \"瑞士SMI\": \"100.SSMI\",\n    \"韩国KOSPI2\": \"101.KOSPI\",\n    \"德国DAX2\": \"101.GDAXI\",\n}\n\nfor name, secid in codes.items():\n    url = f\"https://push2.eastmoney.com/api/qt/stock/get?secid={secid}&fields=f43,f170\"\n    try:\n        data = fetch(url)\n        j = json.loads(data)\n        d = j.get(\"data\",{})\n        price = d.get(\"f43\")\n        if price and price > 0:\n            chg = d.get(\"f170\")\n            print(f\"  ✅ {name}: {price} | 涨跌{chg}\")\n        else:\n            print(f\"  ❌ {name}: 无数据\")\n    except Exception as e:\n        print(f\"  ❌ {name}: {e}\")\n'@)", "Bash(python -c @'\nimport urllib.request, json\n\n# 雅虎财经API（国内可能可访问）\n# 用 query1.finance.yahoo.com\nsymbols = [\"^KS11\",\"^GDAXI\",\"^FCHI\",\"^SSMI\"]\nfor s in symbols:\n    try:\n        url = f\"https://query1.finance.yahoo.com/v8/finance/chart/{s}?range=1d&interval=1d\"\n        req = urllib.request.Request(url, headers={\"User-Agent\":\"Mozilla/5.0\"})\n        data = urllib.request.urlopen(req, timeout=10).read().decode(\"utf-8\")\n        j = json.loads(data)\n        meta = j.get(\"chart\",{}).get(\"result\",[{}])[0].get(\"meta\",{})\n        price = meta.get(\"regularMarketPrice\",\"?\")\n        prev = meta.get(\"chartPreviousClose\",\"?\")\n        if isinstance(price, (int,float)) and isinstance(prev, (int,float)) and prev:\n            chg = round((price-prev)/prev*100, 2)\n            print(f\"  ✅ {s}: {price} | 涨跌{chg:+.2f}%\")\n        else:\n            print(f\"  ❌ {s}: 无有效数据\")\n    except Exception as e:\n        print(f\"  ❌ {s}: {e}\")\n'@)", "Bash(python -c @'\nfrom fund_utils import fetch_bytes\nimport re\n\n# 新浪手机版 - 全球指数\ncodes = [\"kospi\",\"ks11\",\"dax\",\"gdaxi\",\"cac\",\"fchi\",\"smi\",\"ssmi\"]\nfor c in codes:\n    url = f\"https://stock.finance.sina.com.cn/usstock/api/json_v2.php/GlobalIndexService.getGlobalIndex?code={c}\"\n    data = fetch_bytes(url, headers={\"User-Agent\":\"Mozilla/5.0\",\"Referer\":\"https://finance.sina.com.cn\"})\n    text = data.decode(\"gbk\",\"ignore\")\n    print(f\"  {c}: {text[:100]}\")\n'@)", "Bash(python -c @'\nfrom fund_utils import fetch_bytes\nimport re, urllib.request\n\n# 尝试不同的新浪全球接口\n# 新浪的 \"hq.sinajs.cn\" 已知前缀: gb_$, rt_, int_\n# 再试试其它格式\n\n# 美股三大指数已经可用，需要找欧亚的\n# 试试 mark.finance.sina.com.cn 或 stock.finance.sina.com.cn\n# 新浪全球股票实时行情\n\ntests = [\n    # 移动端全球指数\n    (\"韩\", \"https://stock.finance.sina.com.cn/stock/api/json_v2.php/GlobalIndexService.getGlobalIndex?code=KOSPI\"),\n    (\"韩\", \"https://stock.finance.sina.com.cn/stock/api/json_v2.php/GlobalIndexService.getGlobalIndex?code=KS11\"),\n    (\"德\", \"https://stock.finance.sina.com.cn/stock/api/json_v2.php/GlobalIndexService.getGlobalIndex?code=DAX\"),\n    (\"法\", \"https://stock.finance.sina.com.cn/stock/api/json_v2.php/GlobalIndexService.getGlobalIndex?code=CAC\"),\n    (\"瑞\", \"https://stock.finance.sina.com.cn/stock/api/json_v2.php/GlobalIndexService.getGlobalIndex?code=SMI\"),\n    # 试试东方财富的恒生/全球接口\n    (\"韩\", \"http://push2.eastmoney.com/api/qt/stock/get?secid=100.KOSPI&fields=f43,f170,f57,f58,f169\"),\n    (\"德\", \"http://push2.eastmoney.com/api/qt/stock/get?secid=100.GDAXI&fields=f43,f170\"),\n    # 试试新浪的旧版实时接口\n    (\"韩\", \"http://hq.sinajs.cn/list=s_kospi\"),\n    (\"韩\", \"http://hq.sinajs.cn/list=ks_kospi\"),\n]\n\nfor market, url in tests:\n    try:\n        data = fetch_bytes(url, headers={\"User-Agent\":\"Mozilla/5.0\",\"Referer\":\"https://finance.sina.com.cn\"})\n        text = data.decode(\"gbk\",\"ignore\")[:150]\n        if text and text != \"{\" and \"错误\" not in text and \"ERROR\" not in text:\n            print(f\"  ✅ [{market}] {url[-30:]}: {text[:100]}\")\n        else:\n            print(f\"  ❌ [{market}] {url[-30:]}\")\n    except Exception as e:\n        print(f\"  ❌ [{market}] {url[-30:]}: {e}\")\n'@)", "Bash(python -c @'\nimport urllib.request, json\n\n# 试试雅虎不同的终端\nfor base in [\"query1.finance.yahoo.com\",\"query2.finance.yahoo.com\"]:\n    for s in [\"^KS11\",\"^GDAXI\",\"^FCHI\"]:\n        url = f\"https://{base}/v8/finance/chart/{s}?range=5d&interval=1d\"\n        req = urllib.request.Request(url, headers={\"User-Agent\":\"Mozilla/5.0\"})\n        try:\n            data = urllib.request.urlopen(req, timeout=5).read()\n            print(f\"  ✅ {base}/{s}: 有数据\")\n            break\n        except Exception as e:\n            print(f\"  ❌ {base}/{s}: {e}\")\n            break\n    break  # 只试第一个\n'@)", "Bash(python -c @'\nfrom fund_utils import fetch_bytes\n\n# 腾讯个股行情格式\ndata = fetch_bytes(\"http://qt.gtimg.cn/q=sh600519\", headers={\"User-Agent\":\"Mozilla/5.0\"})\ntext = data.decode(\"gbk\")\nparts = text.split(\"~\")\nprint(f\"腾讯个股字段数: {len(parts)}\")\nname = parts[1] if len(parts) > 1 else \"?\"\nprev_close = parts[4] if len(parts) > 4 else \"?\"\nprice = parts[3] if len(parts) > 3 else \"?\"\nchg_pct = parts[32] if len(parts) > 32 else \"?\"\nprint(f\"name={name} prev_close={prev_close} price={price} chg%={chg_pct}\")\n# 涨跌幅也可以从 (price-prev)/prev 算\n'@)", "Bash(python -m mypy fund_utils.py fund_watch.py fund_monitor.py fund_recommend.py global_briefing.py config.py 2>&1)", "Bash(git add -A && git commit -m \"feat: 全项目数据源备选机制\n\n- fund_utils.py: 新增 _fetch_fund_estimate() 共享函数\n  基金实时估算支持双URL备选（https/http）\n- fund_watch.py _parse_real_time: 改用共享函数\n  _parse_holdings: 东方财富 F10 双URL备选\n- fund_monitor.py _fetch_stock_change: 新浪→腾讯互备\n  check_intraday: 改用共享函数，支持备用接口\n- fund_recommend.py _fetch_rank_list: 双URL备选\n- tests: mock路径更新（按实际调用链修正）\" 2>&1 | Select-Object -Last 3)"]
# ask = ["Edit(src/**)"]   # force a prompt even if otherwise allowed

[sandbox]
# Confine tool blast radius. File-writers (write_file/edit_file/multi_edit)
# may only write under workspace_root (empty = current dir) + allow_write.
# bash = "enforce" (default) jails each command in an OS sandbox (macOS now;
# graceful fallback elsewhere); "off" disables it. network allows egress.
# workspace_root = ""            # default: current working directory
# allow_write = ["/tmp"]          # extra dirs writers may also modify
bash    = "enforce"
network = true

[statusline]
# A custom status line: a command whose first stdout line replaces the built-in
# data row. It receives {"model","contextUsed","contextWindow","cwd"} as JSON on stdin.
# command = "my-statusline.sh"

