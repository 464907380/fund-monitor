<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
  /* ── 基础 ── */
  body { margin:0; padding:0; background:#f4f4f5; font-family:'Microsoft YaHei','PingFang SC',Arial,sans-serif; font-size:13px; color:#333; }
  .wrapper { max-width:700px; margin:0 auto; padding:12px; }

  /* ── 头部 ── */
  .header { background:linear-gradient(135deg,#1a1a2e,#16213e); padding:18px 24px; border-radius:10px 10px 0 0; }
  .header h1 { margin:0; color:#fff; font-size:18px; font-weight:bold; display:inline; }
  .header .date { color:#889; font-size:12px; margin-left:12px; }

  /* ── 表格 ── */
  .content { background:#fff; padding:16px 12px; border-radius:0 0 10px 10px; }
  table.data { width:100%; border-collapse:collapse; font-size:13px; }
  table.data th { background:#f5f5f5; padding:8px 6px; border-bottom:2px solid #ddd; text-align:left; white-space:nowrap; font-size:12px; color:#666; }
  table.data td { padding:6px; border-bottom:1px solid #eee; }
  table.data td.num { text-align:right; font-weight:bold; font-family:Consolas,monospace; }
  .red { color:#d32f2f; }
  .green { color:#2e7d32; }

  /* ── 警报 ── */
  .alerts { margin-top:16px; background:#fff5f5; border:1px solid #fcc; border-radius:8px; padding:12px; }
  .alerts-title { font-weight:bold; font-size:14px; margin-bottom:8px; color:#c62828; }
  .alerts-item { font-size:13px; margin:4px 0; padding:6px 0; border-bottom:1px solid #fee; }

  /* ── 底部 ── */
  .footer { padding:10px 20px; font-size:11px; color:#999; text-align:center; border-top:1px solid #eee; margin-top:8px; }

  /* ── 暗色模式 ── */
  @media (prefers-color-scheme:dark) {
    body { background:#1a1a2e; color:#e0e0e0; }
    .content { background:#2a2a3e; }
    table.data th { background:#333; color:#aaa; }
    table.data td { border-bottom:1px solid #444; }
    .footer { border-top:1px solid #444; color:#666; }
    .alerts { background:#3a2020; border-color:#633; }
    .alerts-title { color:#ff8a80; }
    .alerts-item { border-bottom:1px solid #533; }
  }

  /* ── 移动端 ── */
  @media screen and (max-width:600px) {
    .wrapper { padding:6px; }
    .header { padding:14px 16px; border-radius:8px 8px 0 0; }
    .content { padding:10px 6px; }
    table.data { font-size:12px; }
    table.data th, table.data td { padding:4px 3px; }
  }
</style>
</head>
<body>
<div class="wrapper">
<div class="header">
  <h1>📊 基金晚报</h1>
  <span class="date">{{DATE}}</span>
</div>
<div class="content">
<table class="data">
  <thead>
  <tr>
    <th>代码</th>
    <th>基金名</th>
    <th class="num">涨跌</th>
    <th class="num">近5日</th>
    <th class="num">近1月</th>
    <th class="num">近3月</th>
    <th class="num">近1年</th>
    <th>经理</th>
  </tr>
</thead>
<tbody>
{{ROWS}}
</tbody>
</table>
{{ALERTS}}
</div>
<div class="footer">Fund Monitor &middot; 数据来源：天天基金</div>
</div>
</body>
</html>
