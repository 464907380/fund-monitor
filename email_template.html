<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
  /* 邮件客户端兼容：仅保留动态生成的 class 定义 */
  td.num { text-align:right; font-weight:bold; font-family:Consolas,monospace; }
  .red { color:#d32f2f; }
  .green { color:#2e7d32; }
</style>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:'Microsoft YaHei','PingFang SC',Arial,sans-serif;font-size:13px;color:#333;">
<div style="max-width:700px;margin:0 auto;padding:12px;">

<div style="background:linear-gradient(135deg,#1a1a2e,#16213e);padding:18px 24px;border-radius:10px 10px 0 0;">
  <h1 style="margin:0;color:#fff;font-size:18px;font-weight:bold;display:inline;">📊 基金晚报</h1>
  <span style="color:#889;font-size:12px;margin-left:12px;">{{DATE}}</span>
</div>

<div style="background:#fff;padding:16px 12px;border-radius:0 0 10px 10px;">
<table style="width:100%;border-collapse:collapse;font-size:13px;">
  <thead>
  <tr style="background:#f5f5f5;">
    <th style="padding:8px 6px;border-bottom:2px solid #ddd;text-align:left;white-space:nowrap;font-size:12px;color:#666;">代码</th>
    <th style="padding:8px 6px;border-bottom:2px solid #ddd;text-align:left;white-space:nowrap;font-size:12px;color:#666;">基金名</th>
    <th style="padding:8px 6px;border-bottom:2px solid #ddd;font-size:12px;color:#666;">涨跌</th>
    <th style="padding:8px 6px;border-bottom:2px solid #ddd;font-size:12px;color:#666;">近5日</th>
    <th style="padding:8px 6px;border-bottom:2px solid #ddd;font-size:12px;color:#666;">近1月</th>
    <th style="padding:8px 6px;border-bottom:2px solid #ddd;font-size:12px;color:#666;">近3月</th>
    <th style="padding:8px 6px;border-bottom:2px solid #ddd;font-size:12px;color:#666;">近1年</th>
    <th style="padding:8px 6px;border-bottom:2px solid #ddd;text-align:left;white-space:nowrap;font-size:12px;color:#666;">经理</th>
  </tr>
</thead>
<tbody>
{{ROWS}}
</tbody>
</table>
{{ALERTS}}
</div>

<div style="padding:10px 20px;font-size:11px;color:#999;text-align:center;border-top:1px solid #eee;margin-top:8px;">Fund Monitor &middot; 数据来源：天天基金</div>
</div>
</body>
</html>
