<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<style>
  td.num { text-align:right; font-weight:600; font-family:Consolas,monospace; font-size:13px; }
  .red { color:#d32f2f; }
  .green { color:#2e7d32; }
</style>
</head>
<body style="margin:0;padding:0;background-color:#fafafa;font-family:'Helvetica Neue','PingFang SC','Microsoft YaHei',Arial,sans-serif;font-size:14px;line-height:1.6;color:#333;">

<!-- 外层 -->
<table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color:#fafafa;">
<tr><td align="center" style="padding:30px 10px;">

  <!-- 邮件容器 600px -->
  <table border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width:600px;">

    <!-- 头部 -->
    <tr>
      <td align="center" style="padding:0 0 20px;">
        <h1 style="margin:0;color:#1a1a2e;font-size:22px;font-weight:700;">📊 基金晚报</h1>
        <p style="margin:4px 0 0;color:#888;font-size:12px;">{{DATE}}</p>
      </td>
    </tr>

    <!-- 基金表格卡片 -->
    <tr>
      <td style="background-color:#ffffff;border-radius:6px;padding:0;">
        <table border="0" cellpadding="0" cellspacing="0" width="100%" style="border-collapse:collapse;">
          <thead>
            <tr>
              <th style="padding:10px 8px;font-size:11px;color:#888;font-weight:600;text-align:left;border-bottom:1px solid #eee;white-space:nowrap;">代码</th>
              <th style="padding:10px 8px;font-size:11px;color:#888;font-weight:600;text-align:left;border-bottom:1px solid #eee;">基金名</th>
              <th style="padding:10px 8px;font-size:11px;color:#888;font-weight:600;text-align:right;border-bottom:1px solid #eee;">涨跌</th>
              <th style="padding:10px 8px;font-size:11px;color:#888;font-weight:600;text-align:right;border-bottom:1px solid #eee;">近1月</th>
              <th style="padding:10px 8px;font-size:11px;color:#888;font-weight:600;text-align:right;border-bottom:1px solid #eee;">近3月</th>
              <th style="padding:10px 8px;font-size:11px;color:#888;font-weight:600;text-align:right;border-bottom:1px solid #eee;">近1年</th>
            </tr>
          </thead>
          <tbody>
{{ROWS}}
          </tbody>
        </table>
      </td>
    </tr>

    <!-- 间距 -->
    <tr><td style="height:12px;">&nbsp;</td></tr>

    <!-- 警报区块 -->
{{ALERTS}}

    <!-- 底部 -->
    <tr>
      <td align="center" style="padding:24px 0 0;font-size:11px;color:#aaa;">
        Fund Monitor · 数据来源：天天基金
      </td>
    </tr>

  </table>

</td></tr>
</table>

</body>
</html>
