<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>基金管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0a0a0f 0%, #141428 50%, #0d0d1a 100%);
  color: #ccc;
  font-family: 'Helvetica Neue','PingFang SC','Microsoft YaHei',Arial,sans-serif;
  font-size: 14px; min-height: 100vh;
}
.container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

/* 标题 */
header { text-align: center; margin-bottom: 28px; }
h1 {
  font-size: 26px; font-weight: 700; letter-spacing: 2px;
  background: linear-gradient(90deg, #66bb6a, #42a5f5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle { font-size: 13px; color: #666; margin-top: 4px; letter-spacing: 4px; }

/* 卡片 */
.card {
  background: rgba(26,26,40,0.85);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  overflow: visible;
}

/* 添加区域卡片（浮在列表上方） */
.add-card { position: relative; z-index: 10; }
.add-section label {
  display: block; font-size: 13px; color: #888; margin-bottom: 8px;
  letter-spacing: 1px;
}
.add-row { display: flex; gap: 10px; }
/* 搜索建议 */
.search-wrap { position: relative; flex: 1; }
.search-wrap input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  color: #e0e0e0; padding: 10px 14px; font-size: 15px; outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: #66bb6a; box-shadow: 0 0 0 2px rgba(102,187,106,0.15); }
.search-wrap input::placeholder { color: #444; }
.suggestions {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 9999;
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; margin-top: 4px; max-height: 240px; overflow-y: auto;
  display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.suggestions.show { display: block; }
.suggestions .item {
  padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; transition: background 0.1s;
}
.suggestions .item:hover { background: rgba(102,187,106,0.1); }
.suggestions .item .scode { font-family: Consolas,monospace; font-size: 12px; color: #666; }
.suggestions .item .sname { font-size: 14px; color: #ccc; }
.add-row button {
  background: linear-gradient(135deg, #66bb6a, #43a047);
  color: #fff; border: none; border-radius: 8px;
  padding: 10px 22px; font-size: 14px; cursor: pointer; font-weight: 600;
  transition: transform 0.15s, box-shadow 0.15s;
}
.add-row button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,187,106,0.3); }
.add-row button:active { transform: translateY(0); }

/* 列表 */
.list-header {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 14px; color: #888; letter-spacing: 1px;
}
.list-header .count { color: #888; font-weight: 600; }

/* 基金行 */
.fund-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.15s;
}
.fund-row:last-child { border-bottom: none; }
.fund-row:hover { background: rgba(255,255,255,0.02); border-radius: 6px; }

.fund-row .info { display: flex; flex-direction: column; gap: 2px; }
.fund-row .code {
  font-family: 'SF Mono','Consolas','Liberation Mono',monospace;
  font-size: 13px; color: #555; letter-spacing: 1px;
}
.fund-row .name {
  font-size: 14px; font-weight: 600; color: #e8e8e8;
  letter-spacing: 0.5px;
}

.fund-row .del-btn {
  background: rgba(239,83,80,0.1);
  border: 1px solid rgba(239,83,80,0.25);
  border-radius: 6px;
  color: #ef5350; padding: 6px 14px; font-size: 12px; cursor: pointer;
  transition: all 0.15s; font-weight: 500;
}
.fund-row .del-btn:hover {
  background: #ef5350; color: #fff; border-color: #ef5350;
  box-shadow: 0 2px 8px rgba(239,83,80,0.3);
}

/* 消息 */
.msg {
  padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;
  font-size: 13px; display: none; animation: fadeIn 0.2s;
}
.msg.ok {
  display: block;
  background: rgba(102,187,106,0.1);
  color: #81c784;
  border: 1px solid rgba(102,187,106,0.2);
}
.msg.err {
  display: block;
  background: rgba(239,83,80,0.1);
  color: #ef9a9a;
  border: 1px solid rgba(239,83,80,0.2);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 功能概览 */
.feature-list { }
.feature-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.feature-row:last-child { border-bottom: none; }
.feature-row:hover { background: rgba(255,255,255,0.02); border-radius: 6px; }
.feature-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
.feature-body { flex: 1; min-width: 0; }
.feature-name { font-size: 15px; font-weight: 600; color: #e0e0e0; }
.feature-desc { font-size: 13px; color: #777; margin-top: 2px; line-height: 1.5; }
.feature-info { font-size: 12px; color: #666; margin-top: 2px; }
.feature-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.feature-time { font-size: 12px; color: #666; white-space: nowrap; font-family: Consolas,monospace; letter-spacing: 0.5px; }
.feature-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.feature-status.ok { background: #66bb6a; box-shadow: 0 0 6px rgba(102,187,106,0.5); }
.feature-status.fail { background: #ef5350; box-shadow: 0 0 6px rgba(239,83,80,0.5); }
.empty {
  text-align: center; padding: 48px 16px;
  color: #555; font-size: 15px; letter-spacing: 1px;
}

/* 底部信息 */
.footer {
  text-align: center; font-size: 11px; color: #333;
  margin-top: 24px; letter-spacing: 2px;
}

/* 删除确认弹窗美化 */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  justify-content: center; align-items: center; z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #1e1e30; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 24px; max-width: 360px; width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.modal-box p { margin-bottom: 20px; color: #ccc; font-size: 15px; text-align: center; }
.modal-box .code-big {
  display: block; font-size: 22px; font-weight: 700;
  color: #e0e0e0; text-align: center; margin-bottom: 4px;
  font-family: Consolas, monospace;
}
.modal-box .name-big {
  display: block; font-size: 13px; color: #777; text-align: center; margin-bottom: 16px;
}
.modal-actions { display: flex; gap: 10px; }
.modal-actions button {
  flex: 1; padding: 10px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.modal-actions .btn-cancel {
  background: rgba(255,255,255,0.05); color: #999;
  border: 1px solid rgba(255,255,255,0.08);
}
.modal-actions .btn-cancel:hover { background: rgba(255,255,255,0.1); }
.modal-actions .btn-confirm {
  background: linear-gradient(135deg, #ef5350, #e53935); color: #fff;
}
.modal-actions .btn-confirm:hover { box-shadow: 0 4px 12px rgba(239,83,80,0.3); }

/* 渐变分割线 */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(102,187,106,0.2), rgba(66,165,245,0.2), transparent);
  margin: 8px 0 16px;
}
</style>
</head>
<body>
<div class="container" id="app">

  <header>
    <h1>📋 基金监控</h1>
    <div class="subtitle">FUND WATCH MANAGER</div>
  </header>

  <div id="msg" class="msg"></div>


  <div class="card">
    <div class="list-header">
      <span>📊 基金晚报</span>
      <span class="count" id="briefDate" style="font-size:12px;">未生成</span>
    </div>
    <div class="divider"></div>
    <div style="padding:0 0 8px;text-align:center;">
      <button onclick="runBriefing()" id="briefBtn" style="background:linear-gradient(135deg,#42a5f5,#1e88e5);color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;font-weight:600;transition:all 0.15s;">📊 生成晚报</button>
    </div>
    <div id="briefContent" style="padding:0;font-size:12px;color:#ccc;"></div>
  </div>

  <div class="card add-card">
    <div class="add-section">
      <label>✦ 添加基金（多个用空格/逗号分隔）</label>
      <div class="add-row">
        <div class="search-wrap">
          <input id="addInput" type="text" placeholder="输入代码或名称搜索…" autocomplete="off" spellcheck="false">
          <div class="suggestions" id="suggestions"></div>
        </div>
        <button onclick="addFunds()">添加</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="list-header">
      <span>监控列表</span>
      <span class="count" id="count">0 只</span>
    </div>
    <div class="divider"></div>
    <div id="list"></div>
  </div>


  <div class="card">
    <div class="list-header">
      <span>功能概览</span>
    </div>
    <div class="divider"></div>
    <div id="features"></div>
  </div>

  <div class="card">
    <div class="list-header">
      <span>⚙️ 评分维度</span>
    </div>
    <div class="divider"></div>
    <div id="dimsList" style="font-size:12px;"></div>
    <div style="padding:12px 4px 0;display:flex;gap:8px;justify-content:center;">
      <button onclick="saveDims()" id="dimsSaveBtn" style="background:linear-gradient(135deg,#66bb6a,#43a047);color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;font-weight:600;">保存</button>
      <button onclick="resetDims()" style="background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;">重置</button>
      <span style="font-size:11px;color:#555;">· 取消勾选 = 关闭维度，保存后下次评分生效</span>
    </div>
  </div>

  <div class="card" style="padding:12px 20px;display:flex;align-items:center;gap:12px;">
    <span style="font-size:13px;font-weight:600;color:#ccc;">🏆 市场优选</span>
    <span style="font-size:12px;color:#666;flex:1;">推荐结果已缓存，点“运行推荐”重新计算</span>
    <button onclick="runRecommend()" id="recBtn2" style="background:linear-gradient(135deg,#42a5f5,#1e88e5);color:#fff;border:none;border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;font-weight:600;transition:all 0.15s;">▶ 运行推荐</button>
  </div>

</div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <span class="code-big" id="modalCode"></span>
    <span class="name-big" id="modalName"></span>
    <p>确定从监控中移除吗？</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmRemove()">确认移除</button>
    </div>
  </div>
</div>

<script>
const API = '';
let funds = [];
let pendingCode = null;

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'fadeIn 0.2s';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function htmlEscape(s) {
  if (typeof s !== 'string') return s;
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function loadList() {
  const r = await fetch(API + '/api/list');
  const d = await r.json();
  funds = d.funds || [];
  render();
}

function render() {
  const el = document.getElementById('list');
  document.getElementById('count').textContent = funds.length + ' 只';
  if (!funds.length) {
    el.innerHTML = '<div class="empty">暂无监控基金</div>';
    return;
  }
  el.innerHTML = funds.map(f => {
    const name = htmlEscape(f.name || '');
    const code = htmlEscape(f.code || '');
    return `<div class="fund-row">
      <div class="info">
        <span class="name">${name || code}</span>
        <span class="code">${name ? code : ''}</span>
      </div>
      <button class="del-btn" onclick="openModal('${htmlEscape(f.code)}', '${htmlEscape(f.name || '')}')">删除</button>
    </div>`;
  }).join('');
}

async function addFunds() {
  const input = document.getElementById('addInput');
  const raw = input.value.trim();
  if (!raw) return;
  const codes = raw.split(/[\s,，、;；]+/).filter(Boolean);
  const r = await fetch(API + '/api/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ codes }),
  });
  const d = await r.json();
  input.value = '';
  if (d.ok) {
    const parts = [];
    if (d.added.length) parts.push('✅ 添加 ' + d.added.join(', '));
    if (d.skipped.length) parts.push('⏭️ 已存在 ' + d.skipped.join(', '));
    if (d.invalid.length) parts.push('⚠️ 格式错误 ' + d.invalid.join(', '));
    showMsg(parts.join('；') + `（当前 ${d.total} 只）`, 'ok');
    await loadList();
  } else {
    showMsg('❌ ' + (d.error || '添加失败'), 'err');
  }
}

function openModal(code, name) {
  pendingCode = code;
  document.getElementById('modalCode').textContent = code;
  document.getElementById('modalName').textContent = name;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  pendingCode = null;
  document.getElementById('modal').classList.remove('show');
}

async function confirmRemove() {
  if (!pendingCode) return;
  const code = pendingCode;
  closeModal();
  const r = await fetch(API + '/api/remove', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ codes: [code] }),
  });
  const d = await r.json();
  if (d.ok) {
    showMsg('已移除 ' + code + '（当前 ' + d.total + ' 只）', 'ok');
    await loadList();
  } else {
    showMsg('❌ ' + (d.error || '移除失败'), 'err');
  }
}

document.getElementById('addInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFunds();
});

// 搜索建议
let searchTimer = null;
document.getElementById('addInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { closeSuggestions(); return; }
  searchTimer = setTimeout(async () => {
    const r = await fetch(API + '/api/search?q=' + encodeURIComponent(q));
    const d = await r.json();
    showSuggestions(d.results || []);
  }, 200);
});

document.getElementById('addInput').addEventListener('blur', () => {
  setTimeout(closeSuggestions, 200);
});
document.getElementById('addInput').addEventListener('focus', e => {
  if (e.target.value.trim()) {
    e.target.dispatchEvent(new Event('input'));
  }
});

function showSuggestions(results) {
  const el = document.getElementById('suggestions');
  if (!results.length) { el.classList.remove('show'); return; }
  el.innerHTML = results.map(r => `
    <div class="item" data-code="${r.code}" data-name="${r.name.replace(/"/g,'&quot;')}">
      <span class="sname">${r.name}</span>
      <span class="scode">${r.code}</span>
    </div>
  `).join('');
  el.classList.add('show');
  // 点击选中
  el.querySelectorAll('.item').forEach(item => {
    item.addEventListener('click', () => {
      const code = item.dataset.code;
      const name = item.dataset.name;
      document.getElementById('addInput').value = code;
      closeSuggestions();
    });
  });
}

function closeSuggestions() {
  document.getElementById('suggestions').classList.remove('show');
}

loadList();

async function loadFeatures() {
  const r = await fetch(API + '/api/tasks');
  const d = await r.json();
  if (!d.ok) return;
  const el = document.getElementById('features');
  el.innerHTML = d.tasks.map(t => {
    const running = t.running;
    const statusClass = running ? 'ok' : 'unknown';
    const statusText = running ? '运行中' : (t.last_result === '0' ? '上次成功' : t.last_result ? '上次失败' : '');
    return `
      <div class="feature-row" data-task-id="${t.id}">
        <div class="feature-icon">${t.icon}</div>
        <div class="feature-body">
          <div class="feature-name">${t.label}</div>
          <div class="feature-desc">${t.desc || ''}</div>
          <div class="feature-info">${statusText}${t.next_run ? ' · 下次 ' + t.next_run : ''}</div>
        </div>
        <div class="feature-meta">
          <span class="feature-time">${t.time}</span>
          <span class="feature-status ${statusClass}"></span>
        </div>
      </div>
    `;
  }).join('');
}


var lastBriefingMtime = 0;
function updateHeartbeat() {
  fetch(API + '/api/heartbeat').then(r => r.json()).then(d => {
    if (!d.ok) return;
    const hb = d.heartbeats || {};
    document.querySelectorAll('.feature-row').forEach(row => {
      const name = row.dataset.taskId;
      const el = row.querySelector('.feature-running');
      if (name && hb[name]) {
        el.textContent = '  ▶ 运行中';
        el.style.display = 'inline';
      } else if (el) {
        el.textContent = '';
        el.style.display = 'none';
      }
    });
    
    if (lastBriefingMtime > 0 && d.briefing_mtime && d.briefing_mtime !== lastBriefingMtime) {
      loadBriefing();
    }
    if (d.briefing_mtime) { lastBriefingMtime = d.briefing_mtime; }
  });
}

loadFeatures();
updateHeartbeat();
setInterval(updateHeartbeat, 10000);

async function loadHeartbeat() {
  const r = await fetch(API + '/api/heartbeat');
  const d = await r.json();
  if (!d.ok) return;
  const hb = d.heartbeats || {};
  // 给每个正在运行的任务的行加一个"运行中"标记
  document.querySelectorAll('.feature-row').forEach(row => {
    const name = row.dataset.taskId;
    if (name && hb[name]) {
      row.querySelector('.feature-running').textContent = '▶ 运行中';
      row.querySelector('.feature-running').style.display = 'inline';
    } else if (name) {
      row.querySelector('.feature-running').textContent = '';
      row.querySelector('.feature-running').style.display = 'none';
    }
  });
}
setInterval(loadFeatures, 30000);

async function loadBriefing() {
  const r = await fetch(API + '/api/briefing', { method: 'GET' });
  if (!r.ok) return;
  const html = await r.text();
  const el = document.getElementById('briefContent');
  if (el) el.innerHTML = html;
  // 从内容中提取日期更新右上角
  const dateMatch = html.match(/(\d{4}-\d{2}-\d{2})/);
  const dateEl = document.getElementById('briefDate');
  if (dateEl) dateEl.textContent = dateMatch ? dateMatch[1] : '已生成';
}

async function runBriefing() {
  const btn = document.getElementById('briefBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 生成中'; }
  const r = await fetch(API + '/api/briefing', { method: 'POST' });
  const d = await r.json();
  if (d.ok) {
    // 轮询心跳，生成完后刷新展示
    const poll = setInterval(async () => {
      const hb = await fetch(API + '/api/heartbeat').then(r => r.json());
      if (!hb.alive || !hb.alive['fund_briefing']) {
        clearInterval(poll);
        loadBriefing();
        if (btn) { btn.disabled = false; btn.textContent = '📊 生成晚报'; }
      }
    }, 5000);
  } else {
    if (btn) { btn.disabled = false; btn.textContent = '📊 生成晚报'; }
  }
}

// 页面加载时检查晚报是否正在生成
async function checkBriefRunning() {
  const hb = await fetch(API + '/api/heartbeat').then(r => r.json());
  if (hb.alive && hb.alive['fund_briefing']) {
    const btn = document.getElementById('briefBtn');
    if (btn) { btn.disabled = true; btn.textContent = '⏳ 生成中'; }
    // 仍在运行，30 秒后自动刷新状态
    setTimeout(checkBriefRunning, 30000);
  }
}

checkBriefRunning();

loadBriefing();


var ALL_DIM_KEYS = ['y1','m3','m1','sharpe','win_rate','profit_ratio','sortino','recovery','sy6','sy3','max_dd','rate','scale','annual_return','institutional','f5','sy2','volatility','calmar','max_loss_days'];
var DIM_INFO = {
  'y1': {name:'近1年收益',desc:'最近一年的表现'},
  'm3': {name:'近3月收益',desc:'近三个月涨跌幅'},
  'm1': {name:'近1月收益',desc:'近一个月涨跌幅'},
  'sharpe': {name:'夏普比率',desc:'每承受 1 份波动能换来的收益'},

async function loadDims() {
  const r = await fetch(API + '/api/dims');
  const d = await r.json();
  if (!d.ok || !d.dims) return;
  const el = document.getElementById('dimsList');
  if (!el) return;
  const allKeys = ['y1','m3','m1','sharpe','win_rate','profit_ratio','sortino','recovery','sy6','sy3','max_dd','rate','scale','annual_return','institutional'];
  const usedKeys = d.dims.map(function(x){ return x.key; });
  
  el.innerHTML = '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;font-size:11px;" id="dimsTable"><thead><tr style="background:#2a2a2a;">'
    + '<th style="padding:4px 6px;text-align:left;color:#888;border-bottom:1px solid #333;">开关</th>'
    + '<th style="padding:4px 6px;text-align:left;color:#888;border-bottom:1px solid #333;">维度</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #333;">权重</th>'
    + '<th style="padding:4px 6px;text-align:left;color:#888;border-bottom:1px solid #333;">说明</th>'
    + '<th style="padding:4px 6px;text-align:center;color:#888;border-bottom:1px solid #333;"></th>'
    + '</tr></thead><tbody>'
    + d.dims.map(function(dim, i) {
        const pct = Math.round(dim.weight * 100);
        return '<tr>'
          + '<td style="padding:3px 6px;text-align:center;border-bottom:1px solid #333;"><input type="checkbox" ' + (dim.enabled !== false ? 'checked' : '') + ' onchange="markDimsDirty()"></td>'
          + '<td style="padding:3px 6px;border-bottom:1px solid #333;color:#e0e0e0;">' + htmlEscape(dim.name) + '<br><span style="color:#555;font-size:10px;font-family:Consolas;">' + htmlEscape(dim.key) + '</span></td>'
          + '<td style="padding:3px 6px;border-bottom:1px solid #333;text-align:right;"><input type="number" min="0" max="100" value="' + pct + '" style="width:50px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e0e0;padding:2px 6px;text-align:right;font-family:Consolas;font-size:12px;" onchange="markDimsDirty()">%</td>'
          + '<td style="padding:3px 6px;border-bottom:1px solid #333;color:#666;font-size:11px;">' + htmlEscape(dim.desc) + '</td>'
          + '<td style="padding:3px 6px;text-align:center;border-bottom:1px solid #333;"><button onclick="removeDim(this)" style="background:none;border:none;color:#ef5350;cursor:pointer;font-size:14px;">✖</button></td>'
          + '</tr>';
      }).join('')
    + '</tbody></table></div>'
    + '<div id="addDimArea" style="padding:8px 4px;text-align:center;"></div>';
  renderAddDimBtn();
  updateDimsTotal();
}

function updateDimsTotal() {
  var total = 0;
  document.querySelectorAll('#dimsTable tbody input[type=number]').forEach(function(n){ total += parseInt(n.value) || 0; });
  var el = document.getElementById('dimsTotal');
  if (!el) {
    el = document.createElement('div');
    el.id = 'dimsTotal';
    el.style.cssText = 'text-align:right;padding:4px 4px 8px;font-size:12px;';
    document.getElementById('addDimArea').before(el);
  }
  var color = total === 100 ? '#66bb6a' : '#ef5350';
  el.innerHTML = '合计: <span style="font-weight:600;color:' + color + ';">' + total + '%</span>';
}
function renderAddDimBtn() {
  const area = document.getElementById('addDimArea');
  if (!area) return;
  const rows = document.querySelectorAll('#dimsTable tbody tr');
  const used = [];
  rows.forEach(function(r){ const s=r.querySelector('td:nth-child(2) span'); if(s) used.push(s.textContent); });
  const avail = ALL_DIM_KEYS.filter(function(k){ return used.indexOf(k) < 0; });
  if (avail.length === 0) {
    area.innerHTML = '<span style="font-size:11px;color:#555;">已包含所有维度</span>';
    return;
  }
  area.innerHTML = '<select id="addDimSelect" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:#ccc;padding:4px 8px;font-size:12px;">'
    + avail.map(function(k){ return '<option value="' + k + '">' + DIM_INFO[k].name + ' (' + k + ')</option>'; }).join('')
    + '</select> '
    + '<button onclick="doAddDim()" style="background:rgba(255,255,255,0.05);border:1px dashed rgba(255,255,255,0.2);border-radius:6px;color:#888;padding:6px 16px;font-size:12px;cursor:pointer;">+ 添加</button>';
}

function doAddDim() {
  const sel = document.getElementById('addDimSelect');
  if (!sel) return;
  const key = sel.value;
  const info = DIM_INFO[key];
  if (!info) return;
  const tbody = document.querySelector('#dimsTable tbody');
  const tr = document.createElement('tr');
  tr.innerHTML = '<td style="padding:3px 6px;text-align:center;border-bottom:1px solid #333;"><input type="checkbox" checked onchange="markDimsDirty()"></td>'
    + '<td style="padding:3px 6px;border-bottom:1px solid #333;color:#e0e0e0;">' + htmlEscape(info.name) + '<br><span style="color:#555;font-size:10px;font-family:Consolas;">' + htmlEscape(key) + '</span></td>'
    + '<td style="padding:3px 6px;border-bottom:1px solid #333;text-align:right;"><input type="number" min="0" max="100" value="5" style="width:50px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e0e0;padding:2px 6px;text-align:right;font-family:Consolas;font-size:12px;" onchange="markDimsDirty()">%</td>'
    + '<td style="padding:3px 6px;border-bottom:1px solid #333;color:#666;font-size:11px;">' + htmlEscape(info.desc) + '</td>'
    + '<td style="padding:3px 6px;text-align:center;border-bottom:1px solid #333;"><button onclick="removeDim(this)" style="background:none;border:none;color:#ef5350;cursor:pointer;font-size:14px;">✖</button></td>';
  tbody.appendChild(tr);
  renderAddDimBtn();
  updateDimsTotal();
  markDimsDirty();
}
function removeDim(btn) {
  btn.closest('tr').remove();
  markDimsDirty();
}

function markDimsDirty() {
  updateDimsTotal();
  document.getElementById('dimsSaveBtn').style.background = 'linear-gradient(135deg,#ef5350,#e53935)';
}

async function saveDims() {
  const rows = document.querySelectorAll('#dimsTable tbody tr');
  const dims = [];
  rows.forEach(function(row) {
    const cb = row.querySelector('input[type=checkbox]');
    const num = row.querySelector('input[type=number]');
    const key = row.querySelector('td:nth-child(2) span').textContent;
    var name = row.querySelector('td:nth-child(2)').textContent.replace(key,'').trim();
    if (name.endsWith('\n')) name = name.slice(0,-1).trim();
    const desc = row.querySelectorAll('td')[3].textContent;
    dims.push({name: name, key: key, weight: parseInt(num.value) / 100, enabled: cb.checked, desc: desc});
  });
  const r = await fetch(API + '/api/dims', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({dims: dims}),
  });
  const d = await r.json();
  if (d.ok) {
    document.getElementById('dimsSaveBtn').style.background = 'linear-gradient(135deg,#66bb6a,#43a047)';
    showMsg('✔ 权重已更新', 'ok');
    loadDims();
  } else {
    showMsg('✖ ' + (d.error || '保存失败'), 'fail');
  }
}

async function runRecommend() {
  const btn = document.getElementById('recBtn2');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 运行中（约 4 分钟）'; }
  const r = await fetch(API + '/api/recommend', { method: 'POST' });
  const d = await r.json();
  if (d.ok) {
    const poll = setInterval(async () => {
      const hb = await fetch(API + '/api/heartbeat').then(r => r.json());
      if (!hb.alive || !hb.alive['fund_recommend']) {
        clearInterval(poll);
        if (btn) { btn.disabled = false; btn.textContent = '▶ 运行推荐'; }
        showMsg('✔ 推荐完成', 'ok');
      }
    }, 10000);
  } else {
    if (btn) { btn.disabled = false; btn.textContent = '▶ 运行推荐'; }
    showMsg('✖ ' + (d.error || '发起失败'), 'fail');
  }
}

function showScoreDetail(items) {

    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u6743\u91cd</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u8d21\u732e</th></tr></thead><tbody>';
  var total = 0;
  items.forEach(function(item){
    var name = item[0], score = item[1], weight = item[2], value = item[3];
    if (score === null) {
      html += '<tr><td style="padding:3px 6px;border-bottom:1px solid #333;color:#888;">' + name + '</td>'
        + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#555;">-</td>'

        + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#555;">-</td>'
        + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#555;">-</td></tr>';
      return;
    }
    var contrib = (score * weight).toFixed(1);
    total += score * weight;
    var valStr = value !== null && value !== undefined ? value : '-';
    if (typeof valStr === 'number') valStr = valStr.toFixed(2);
    html += '<tr><td style="padding:3px 6px;border-bottom:1px solid #333;color:#e0e0e0;">' + name + '</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + valStr + '</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:' + (score >= 80 ? '#66bb6a' : score >= 40 ? '#ffa726' : '#ef5350') + ';">' + score.toFixed(1) + '</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + (weight * 100).toFixed(0) + '%</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + contrib + '</td></tr>';
  });
  html += '<tr><td style="padding:4px 6px;border-top:1px solid #555;color:#888;" colspan="2">\u5408\u8ba1</td>'
    + '<td style="padding:4px 6px;text-align:right;border-top:1px solid #555;font-family:Consolas;font-weight:600;color:#66bb6a;">' + total.toFixed(1) + '</td>'
    + '<td style="padding:4px 6px;text-align:right;border-top:1px solid #555;font-family:Consolas;color:#888;">100%</td>'

  var el = document.getElementById("scoreDetailModal");

    el = document.createElement("div");
    el.id = "scoreDetailModal";
    document.body.appendChild(el);
  }
  el.innerHTML = html;
  var btn = document.getElementById("__closeScoreBtn");
  if (btn) btn.onclick = function(){ el.style.display = "none"; };
  el.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;max-width:500px;width:90%;";
}
