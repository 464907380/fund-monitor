<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>基金管理 · FundWatch</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #08080f;
  color: #c8c8d0;
  font-family: 'Inter','SF Pro Display','PingFang SC','Microsoft YaHei',Arial,sans-serif;
  font-size: 14px; min-height: 100vh; overflow-x: hidden;
}
/* 动态网格背景 */
body::before {
  content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background-image:
    linear-gradient(rgba(66,165,245,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(66,165,245,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
/* 光晕效果 */
body::after {
  content: ''; position: fixed; top: -50%; left: -50%; right: -50%; bottom: -50%;
  background: radial-gradient(ellipse at 20% 30%, rgba(66,165,245,0.04) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 70%, rgba(102,187,106,0.03) 0%, transparent 50%);
  pointer-events: none; z-index: 0;
  animation: bgShift 20s ease-in-out infinite;
}
@keyframes bgShift {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(2%, 1%); }
}
.container { max-width: 1000px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }

/* 标题 — 终端风格 */
header {
  text-align: center; margin-bottom: 32px;
  position: relative;
}
header::after {
  content: ''; display: block; width: 60px; height: 2px;
  background: linear-gradient(90deg, transparent, #42a5f5, transparent);
  margin: 16px auto 0; border-radius: 1px;
  opacity: 0.6;
}
h1 {
  font-size: 28px; font-weight: 700; letter-spacing: 3px;
  background: linear-gradient(135deg, #66bb6a, #42a5f5, #7c4dff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  font-family: 'Consolas',monospace;
  font-size: 12px; color: rgba(102,187,106,0.4); margin-top: 6px;
  letter-spacing: 6px; text-transform: uppercase;
}

/* 卡片 — 玻璃质感+发光边框 */
.card {
  background: rgba(18,18,30,0.85);
  backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 20px 22px;
  margin-bottom: 18px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.03);
  overflow: visible;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.card:hover {
  border-color: rgba(66,165,245,0.12);
  box-shadow: 0 4px 32px rgba(0,0,0,0.5), 0 0 40px rgba(66,165,245,0.03), inset 0 1px 0 rgba(255,255,255,0.03);
}

/* 输入框通用 */
input, select, button { font-family: inherit; outline: none; }

/* 添加区域 */
.add-card { position: relative; z-index: 10; }
.add-section label {
  display: block; font-size: 12px; color: #888; margin-bottom: 8px;
  letter-spacing: 1px; text-transform: uppercase;
}
.add-row { display: flex; gap: 10px; }
.search-wrap { position: relative; flex: 1; }
.search-wrap input {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
  color: #e0e0e0; padding: 10px 14px; font-size: 15px;
  transition: border-color 0.25s, box-shadow 0.25s;
}
.search-wrap input:focus { border-color: #66bb6a; box-shadow: 0 0 0 3px rgba(102,187,106,0.1); }
.search-wrap input::placeholder { color: #333; }
.suggestions {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 9999;
  background: #141428; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 10px; margin-top: 6px; max-height: 240px; overflow-y: auto;
  display: none; box-shadow: 0 12px 48px rgba(0,0,0,0.6);
}
.suggestions.show { display: block; }
.suggestions .item {
  padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; transition: background 0.15s;
}
.suggestions .item:hover { background: rgba(102,187,106,0.08); }
.suggestions .item .scode { font-family: 'Consolas',monospace; font-size: 11px; color: #555; }
.suggestions .item .sname { font-size: 14px; color: #ccc; }
.add-row button, .toolbar-btn {
  background: linear-gradient(135deg, #66bb6a, #43a047);
  color: #fff; border: none; border-radius: 8px;
  padding: 10px 22px; font-size: 13px; cursor: pointer; font-weight: 600;
  transition: transform 0.15s, box-shadow 0.2s;
  position: relative; overflow: hidden;
}
.add-row button:hover, .toolbar-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(102,187,106,0.25); }
.add-row button:active, .toolbar-btn:active { transform: translateY(0); }

/* 列表头 */
.list-header {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px; color: #888; letter-spacing: 1px;
}
.list-header .count { color: #888; font-weight: 600; }

/* 基金行 */
.fund-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  transition: background 0.15s, padding-left 0.15s;
}
.fund-row:last-child { border-bottom: none; }
.fund-row:hover {
  background: linear-gradient(90deg, rgba(66,165,245,0.03), transparent);
  border-radius: 6px; padding-left: 8px;
}
.fund-row .info { display: flex; flex-direction: column; gap: 2px; }
.fund-row .code {
  font-family: 'Consolas',monospace;
  font-size: 12px; color: #555; letter-spacing: 1px;
}
.fund-row .name {
  font-size: 14px; font-weight: 600; color: #e8e8e8;
  letter-spacing: 0.3px;
}
.fund-row .del-btn {
  background: rgba(239,83,80,0.08);
  border: 1px solid rgba(239,83,80,0.2);
  border-radius: 6px;
  color: #ef5350; padding: 6px 14px; font-size: 12px; cursor: pointer;
  transition: all 0.2s; font-weight: 500;
}
.fund-row .del-btn:hover {
  background: #ef5350; color: #fff; border-color: #ef5350;
  box-shadow: 0 2px 12px rgba(239,83,80,0.3);
}

/* 消息 */
.msg {
  padding: 12px 18px; border-radius: 10px; margin-bottom: 16px;
  font-size: 13px; display: none; animation: msgIn 0.25s ease-out;
  border: 1px solid transparent;
}
.msg.ok {
  display: block;
  background: rgba(102,187,106,0.08);
  color: #81c784;
  border-color: rgba(102,187,106,0.15);
}
.msg.err, .msg.fail {
  display: block;
  background: rgba(239,83,80,0.08);
  color: #ef9a9a;
  border-color: rgba(239,83,80,0.15);
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 功能概览 */
.feature-row {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  transition: background 0.15s, padding-left 0.15s;
}
.feature-row:last-child { border-bottom: none; }
.feature-row:hover {
  background: linear-gradient(90deg, rgba(66,165,245,0.03), transparent);
  border-radius: 8px; padding-left: 8px;
}
.feature-icon { font-size: 24px; width: 36px; text-align: center; flex-shrink: 0; }
.feature-body { flex: 1; min-width: 0; }
.feature-name { font-size: 15px; font-weight: 600; color: #e0e0e0; }
.feature-desc { font-size: 12px; color: #777; margin-top: 3px; line-height: 1.5; }
.feature-info { font-size: 11px; color: #555; margin-top: 3px; font-family: 'Consolas',monospace; }
.feature-meta { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
.feature-time {
  font-size: 11px; color: #555; white-space: nowrap;
  font-family: 'Consolas',monospace; letter-spacing: 0.3px;
}
.feature-status { display: inline-block; width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.feature-status.ok { background: #66bb6a; box-shadow: 0 0 8px rgba(102,187,106,0.4); }
.feature-status.fail { background: #ef5350; box-shadow: 0 0 8px rgba(239,83,80,0.4); }

.task-actions { display: inline-flex; gap: 4px; margin-left: 4px; vertical-align: middle; }
.task-btn {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px; color: #888; cursor: pointer; font-size: 11px;
  padding: 3px 9px; line-height: 1.5; transition: all 0.2s;
}
.task-btn:hover { background: rgba(255,255,255,0.1); }
.task-btn:active { transform: scale(0.92); }
.start-btn:hover { color: #66bb6a; border-color: #66bb6a; box-shadow: 0 0 12px rgba(102,187,106,0.15); }
.stop-btn:hover { color: #ef5350; border-color: #ef5350; box-shadow: 0 0 12px rgba(239,83,80,0.15); }

.timer-badge {
  display: inline-block; padding: 2px 10px; border-radius: 8px;
  font-size: 10px; font-weight: 600; white-space: nowrap;
  letter-spacing: 0.5px; margin-left: 4px; vertical-align: middle;
  text-transform: uppercase;
}
.timer-badge.enabled {
  background: rgba(66,165,245,0.12); color: #42a5f5;
  border: 1px solid rgba(66,165,245,0.2);
}
.timer-badge.running {
  background: rgba(102,187,106,0.12); color: #66bb6a;
  border: 1px solid rgba(102,187,106,0.2);
}
.timer-badge.disabled {
  background: rgba(255,255,255,0.04); color: #555;
  border: 1px solid rgba(255,255,255,0.06);
}

.empty {
  text-align: center; padding: 48px 16px;
  color: #444; font-size: 14px; letter-spacing: 1px;
}

/* 底部 */
.footer {
  text-align: center; font-size: 11px; color: #222;
  margin-top: 32px; letter-spacing: 3px;
  font-family: 'Consolas',monospace;
}

/* 弹窗 */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
  justify-content: center; align-items: center; z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 28px; max-width: 360px; width: 90%;
  box-shadow: 0 12px 48px rgba(0,0,0,0.5);
}
.modal-box p { margin-bottom: 20px; color: #ccc; font-size: 15px; text-align: center; }
.modal-box .code-big {
  display: block; font-size: 22px; font-weight: 700;
  color: #e0e0e0; text-align: center; margin-bottom: 4px;
  font-family: 'Consolas',monospace;
}
.modal-box .name-big {
  display: block; font-size: 13px; color: #777; text-align: center; margin-bottom: 16px;
}
.modal-actions { display: flex; gap: 10px; }
.modal-actions button {
  flex: 1; padding: 10px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.modal-actions .btn-cancel {
  background: rgba(255,255,255,0.05); color: #999;
  border: 1px solid rgba(255,255,255,0.08);
}
.modal-actions .btn-cancel:hover { background: rgba(255,255,255,0.1); }
.modal-actions .btn-confirm {
  background: linear-gradient(135deg, #ef5350, #e53935); color: #fff;
}
.modal-actions .btn-confirm:hover { box-shadow: 0 4px 12px rgba(239,83,80,0.3); }

/* 渐变分割线 */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(102,187,106,0.2), rgba(66,165,245,0.2), transparent);
  margin: 8px 0 16px;
}

/* 顶部工具栏 */
.toolbar {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.toolbar-btn-wrap {
  position: relative;
  overflow: hidden;
  border-radius: 6px;
  flex: 0 1 auto;
}
.toolbar-btn {
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.toolbar-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.toolbar-btn.blue { background: linear-gradient(135deg,#42a5f5,#1e88e5); color: #fff; }
.toolbar-btn.green { background: linear-gradient(135deg,#66bb6a,#43a047); color: #fff; }
.btn-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  width: 0%;
  background: linear-gradient(90deg, #66bb6a, #42a5f5);
  transition: width 0.5s ease;
  border-radius: 0 0 6px 6px;
}
.btn-progress.pulse {
  width: 30%;
  animation: pulseWidth 1.5s ease-in-out infinite;
}
@keyframes pulseWidth {
  0% { width: 10%; opacity: 0.6; }
  50% { width: 60%; opacity: 1; }
  100% { width: 10%; opacity: 0.6; }
}
</style>
</head>
<body>
<div class="container" id="app">

  <header>
    <h1>📋 基金监控</h1>
    <div class="subtitle">FUND WATCH MANAGER</div>
  </header>

  <div id="msg" class="msg"></div>

  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <div class="toolbar-btn-wrap">
      <button onclick="runBriefing()" id="briefBtn" class="toolbar-btn blue">📊 生成晚报</button>
      <div class="btn-progress" id="briefProgress"></div>
    </div>
  </div>


  <div class="card">
    <div class="list-header">
      <span>📊 基金晚报</span>
      <span class="count" id="briefDate" style="font-size:12px;">未生成</span>
    </div>
    <div class="divider"></div>
    <div id="briefContent" style="padding:0;font-size:12px;color:#ccc;"></div>
  </div>

  <div class="card" id="fundFullTableCard">
    <div class="divider"></div>
    <div id="fundFullTable" style="padding:0;font-size:12px;color:#666;"><p style="padding:12px 4px;">⏳ 加载中…</p></div>
  </div>

  <div class="card" id="recommendFullTableCard">
    <div class="divider"></div>
    <div id="recommendFullTable" style="padding:0;font-size:12px;color:#666;"><p style="padding:12px 4px;">⏳ 加载中…</p></div>
  </div>

  <div class="card">
    <div class="list-header">
      <span>⚙️ 评分维度</span>
    </div>
    <div class="divider"></div>
    <!-- 预设栏 -->
    <div style="display:flex;align-items:center;gap:8px;padding:8px 4px 12px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:8px;flex-wrap:wrap;">
      <span style="font-size:12px;color:#888;white-space:nowrap;">📁 预设</span>
      <select id="presetSelect" style="flex:1;min-width:100px;max-width:180px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:4px;color:#ccc;padding:4px 6px;font-size:12px;"></select>
      <button onclick="loadPreset()" style="background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:4px 12px;font-size:12px;cursor:pointer;">📂 加载</button>
      <button onclick="savePreset()" style="background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:4px 12px;font-size:12px;cursor:pointer;">💾 覆盖</button>
      <button onclick="saveAsPreset()" style="background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:4px 12px;font-size:12px;cursor:pointer;">📝 另存为</button>
      <button onclick="deletePreset()" style="background:rgba(255,255,255,0.08);color:#ef5350;border:1px solid rgba(255,255,255,0.15);border-radius:4px;padding:4px 12px;font-size:12px;cursor:pointer;">🗑</button>
    </div>
    <div id="dimsList" style="font-size:12px;"></div>
    <div style="padding:12px 4px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center;">
      <button onclick="saveDims()" id="dimsSaveBtn" style="background:linear-gradient(135deg,#66bb6a,#43a047);border:none;border-radius:6px;color:#fff;padding:8px 20px;font-size:13px;cursor:pointer;" class="dims-save-btn">💾 保存权重</button>
      <button onclick="resetDims()" style="background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;">重置</button>
      <button onclick="calibrateCurves()" id="calibrateBtn" style="background:linear-gradient(135deg,#ffa726,#f57c00);border:none;border-radius:6px;color:#fff;padding:8px 20px;font-size:13px;cursor:pointer;">📐 自动校准</button>
    </div>
    <div id="saveProgressArea" style="padding:6px 4px 2px;display:none;">
      <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:#888;">
        <div style="flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;">
          <div id="saveProgressFill" style="width:0%;height:100%;background:linear-gradient(90deg,#66bb6a,#42a5f5);border-radius:3px;transition:width 0.5s;"></div>
        </div>
        <span id="saveProgressPct" style="font-family:Consolas;min-width:36px;text-align:right;">0%</span>
      </div>
      <div id="saveProgressText" style="font-size:11px;color:#888;padding:2px 0 0;"></div>
    </div>
    <div style="padding:2px 4px 0;font-size:11px;color:#555;text-align:center;">· 取消勾选 = 关闭维度，保存后下次评分生效</div>

    <div class="divider" style="margin:12px 0 8px;"></div>
    <div style="padding:0 4px;">
      <div style="font-size:13px;font-weight:600;color:#ccc;margin-bottom:8px;">🔍 全市场筛选</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12px;">
        <label style="color:#888;">拉取数量
          <input type="number" id="recTopN" value="200" min="50" max="500" style="width:70px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e0e0;padding:4px 8px;margin-left:4px;font-family:Consolas;">
        </label>
        <label style="color:#888;">最低近1年收益
          <input type="number" id="recMinY1" value="20" min="0" max="100" style="width:60px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e0e0;padding:4px 8px;margin-left:4px;font-family:Consolas;"> %
        </label>
        <label style="color:#888;">展示条数
          <input type="number" id="recShowTop" value="20" min="5" max="50" style="width:60px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e0e0;padding:4px 8px;margin-left:4px;font-family:Consolas;">
        </label>
        <label style="color:#888;display:flex;align-items:center;gap:4px;cursor:pointer;">
          <input type="checkbox" id="recSkipMissingPerf" checked style="accent-color:#42a5f5;"> 筛掉缺失收益数据
        </label>
        <label style="color:#888;display:flex;align-items:center;gap:4px;cursor:pointer;">
          <input type="checkbox" id="recSkipLimited" style="accent-color:#42a5f5;"> 筛掉单日限购≤2万
        </label>
      </div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <button onclick="runRecommendFromFilter()" id="recFilterBtn" style="background:linear-gradient(135deg,#42a5f5,#1e88e5);border:none;border-radius:6px;color:#fff;padding:8px 20px;font-size:13px;cursor:pointer;">▶ 运行推荐</button>
        <div style="flex:1;max-width:200px;">
          <div style="height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;">
            <div id="recFilterProgress" style="width:0%;height:100%;background:linear-gradient(90deg,#66bb6a,#42a5f5);border-radius:2px;transition:width 0.5s;"></div>
          </div>
        </div>
        <span id="recFilterStatus" style="font-size:11px;color:#888;"></span>
      </div>
    </div>
  </div>

  <!-- ⚙️ 盘中监控阈值设置 -->
  <div class="card">
    <div style="display:flex;align-items:center;gap:8px;padding:4px 0;">
      <span style="font-size:13px;font-weight:600;color:#ccc;">🔔 盘中监控阈值</span>
      <span style="font-size:11px;color:#666;cursor:pointer;" onclick="loadMonitorConfig()">⟳ 刷新</span>
    </div>
    <div class="divider"></div>
    <div style="font-size:12px;color:#888;padding:4px 0;" id="monitorConfigArea">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div>
          <label style="color:#888;">基金单次急跌</label>
          <input type="number" id="mc_alert_drop_once" value="-3" step="0.5" style="width:70px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#ef5350;padding:4px 8px;font-family:Consolas;"> %
        </div>
        <div>
          <label style="color:#888;">基金单次急涨</label>

<script>
const API = '';
let funds = [];
let pendingCode = null;

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'fadeIn 0.2s';
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function htmlEscape(s) {
  if (typeof s !== 'string') return s;
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function loadList() {
  const r = await fetch(API + '/api/list');
  const d = await r.json();
  funds = d.funds || [];
  render();
}

function render() {
  const el = document.getElementById('list');
  document.getElementById('count').textContent = funds.length + ' 只';
  if (!funds.length) {
    el.innerHTML = '<div class="empty">暂无监控基金</div>';
    return;
  }
  el.innerHTML = funds.map(f => {
    const name = htmlEscape(f.name || '');
    const code = htmlEscape(f.code || '');
    return `<div class="fund-row">
      <div class="info">
        <span class="name">${name || code}</span>
        <span class="code">${name ? code : ''}</span>
      </div>
      <button class="del-btn" onclick="openModal('${htmlEscape(f.code)}', '${htmlEscape(f.name || '')}')">删除</button>
    </div>`;
  }).join('');
}

async function addFunds() {
  const input = document.getElementById('addInput');
  const raw = input.value.trim();
  if (!raw) return;
  const codes = raw.split(/[\s,，、;；]+/).filter(Boolean);
  const r = await fetch(API + '/api/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ codes }),
  });
  const d = await r.json();
  input.value = '';
  if (d.ok) {
    const parts = [];
    if (d.added.length) parts.push('✅ 添加 ' + d.added.join(', '));
    if (d.skipped.length) parts.push('⏭️ 已存在 ' + d.skipped.join(', '));
    if (d.invalid.length) parts.push('⚠️ 格式错误 ' + d.invalid.join(', '));
    showMsg(parts.join('；') + `（当前 ${d.total} 只）`, 'ok');
    await loadList();
    loadSavedTables();
  } else {
    showMsg('❌ ' + (d.error || '添加失败'), 'err');
  }
}

function openModal(code, name) {
  pendingCode = code;
  document.getElementById('modalCode').textContent = code;
  document.getElementById('modalName').textContent = name;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  pendingCode = null;
  document.getElementById('modal').classList.remove('show');
}

async function confirmRemove() {
  if (!pendingCode) return;
  const code = pendingCode;
  closeModal();
  const r = await fetch(API + '/api/remove', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ codes: [code] }),
  });
  const d = await r.json();
  if (d.ok) {
    showMsg('已移除 ' + code + '（当前 ' + d.total + ' 只）', 'ok');
    await loadList();
    loadSavedTables();
  } else {
    showMsg('❌ ' + (d.error || '移除失败'), 'err');
  }
}

document.getElementById('addInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFunds();
});

// 搜索建议
let searchTimer = null;
document.getElementById('addInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { closeSuggestions(); return; }
  searchTimer = setTimeout(async () => {
    const r = await fetch(API + '/api/search?q=' + encodeURIComponent(q));
    const d = await r.json();
    showSuggestions(d.results || []);
  }, 200);
});

document.getElementById('addInput').addEventListener('blur', () => {
  setTimeout(closeSuggestions, 200);
});
document.getElementById('addInput').addEventListener('focus', e => {
  if (e.target.value.trim()) {
    e.target.dispatchEvent(new Event('input'));
  }
});

function showSuggestions(results) {
  const el = document.getElementById('suggestions');
  if (!results.length) { el.classList.remove('show'); return; }
  el.innerHTML = results.map(r => `
    <div class="item" data-code="${r.code}" data-name="${r.name.replace(/"/g,'&quot;')}">
      <span class="sname">${r.name}</span>
      <span class="scode">${r.code}</span>
    </div>
  `).join('');
  el.classList.add('show');
  // 点击选中
  el.querySelectorAll('.item').forEach(item => {
    item.addEventListener('click', () => {
      const code = item.dataset.code;
      const name = item.dataset.name;
      document.getElementById('addInput').value = code;
      closeSuggestions();
    });
  });
}

function closeSuggestions() {
  document.getElementById('suggestions').classList.remove('show');
}

loadList();

async function loadFeatures() {
  const r = await fetch(API + '/api/tasks');
  const d = await r.json();
  if (!d.ok) return;
  const el = document.getElementById('features');
  el.innerHTML = d.tasks.map(t => {
    const running = t.running;
    let badgeHtml = '';
    if (running) {
      badgeHtml = '<span class="timer-badge running">▶ 正在运行</span>';
    } else if (t.timer_enabled) {
      badgeHtml = '<span class="timer-badge enabled">◉ 定时器已启用</span>';
    } else {
      badgeHtml = '<span class="timer-badge disabled">○ 定时器未启用</span>';
    }
    const statusClass = running ? 'ok' : 'unknown';
    const statusText = running ? '运行中' : (t.last_result === '0' ? '上次成功' : t.last_result ? '上次失败' : '');
    return `
      <div class="feature-row" data-task-id="${t.id}">
        <div class="feature-icon">${t.icon}</div>
        <div class="feature-body">
          <div class="feature-name">${t.label}</div>
          <div class="feature-desc">${t.desc || ''}</div>
          <div class="feature-info">${statusText}${t.next_run ? ' · 下次 ' + t.next_run : ''}<span class="feature-running"></span></div>
        </div>
        <div class="feature-meta">
          <span class="feature-time">${t.time}</span>${badgeHtml}
          <span class="feature-status ${statusClass}"></span>
          <span class="task-actions">
            <button class="task-btn start-btn" onclick="startTask('${t.id}')" title="启动">▶</button>
            <button class="task-btn stop-btn" onclick="stopTask('${t.id}')" title="停止">⏹</button>
          </span>
        </div>
      </div>
    `;
  }).join('');
}

async function startTask(taskId) {
  const btn = document.querySelector(`[data-task-id="${taskId}"] .start-btn`);
  if (btn) btn.disabled = true;
  try {
    const r = await fetch(API + '/api/task/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({task_id: taskId}),
    });
    let d;
    try { d = await r.json(); } catch(e) { d = {ok: false, error: '响应解析失败'}; }
    if (d.ok) {
      showMsg('✔ ' + (d.message || '任务已启动'), 'ok');
    } else {
      showMsg('✖ ' + (d.error || '启动失败'), 'fail');
    }
  } catch(e) {
    showMsg('✖ 启动失败: ' + (e.message || e), 'fail');
  }
  if (btn) btn.disabled = false;
  setTimeout(loadFeatures, 2000);
}

async function stopTask(taskId) {
  if (!confirm('确定停止任务「' + taskId + '」？')) return;
  const btn = document.querySelector(`[data-task-id="${taskId}"] .stop-btn`);
  if (btn) btn.disabled = true;
  try {
    const r = await fetch(API + '/api/task/stop', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({task_id: taskId}),
    });
    let d;
    try { d = await r.json(); } catch(e) { d = {ok: false, error: '响应解析失败'}; }
    if (d.ok) {
      showMsg('✔ ' + (d.message || '任务已停止'), 'ok');
    } else {
      showMsg('✖ ' + (d.error || '停止失败'), 'fail');
    }
  } catch(e) {
    showMsg('✖ 停止失败: ' + (e.message || e), 'fail');
  }
  if (btn) btn.disabled = false;
  setTimeout(loadFeatures, 2000);
}


function updateHeartbeat() {
  fetch(API + '/api/heartbeat').then(r => r.json()).then(d => {
    if (!d.ok) return;
    const hb = d.heartbeats || {};
    document.querySelectorAll('.feature-row').forEach(row => {
      const name = row.dataset.taskId;
      const el = row.querySelector('.feature-running');
      if (name && hb[name] && el) {
        el.textContent = '  ▶ 运行中';
        el.style.display = 'inline';
      } else if (el) {
        el.textContent = '';
        el.style.display = 'none';
      }
    });
    // 简报文件有更新时自动刷新（30秒轮询足够及时）
    if (d.briefing_mtime && window._briefingMtime && d.briefing_mtime !== window._briefingMtime) {
      window._briefingMtime = d.briefing_mtime;
      loadBriefing();
    } else if (d.briefing_mtime && !window._briefingMtime) {
      window._briefingMtime = d.briefing_mtime; // 首次初始化，不触发刷新
    }
  });
}

loadFeatures();
updateHeartbeat();
// 页面加载时尝试恢复已保存的推荐/基金表格
loadSavedTables();
setInterval(updateHeartbeat, 30000);

/** 页面加载时恢复已保存的推荐/自选基金表格 */
async function loadSavedTables() {
  try {
    var rtResp = await fetch(API + '/api/recommend-table' + '?_t=' + Date.now());
    if (rtResp.ok) {
      var rtHtml = await rtResp.text();
      if (rtHtml.indexOf('<tbody>') > 0) {
        var rtEl = document.getElementById('recommendFullTable');
        if (rtEl) { rtEl.innerHTML = rtHtml; document.getElementById('recommendFullTableCard').style.display = ''; }
      }
    }
  } catch(e) {}
  try {
    var ftResp = await fetch(API + '/api/fund-table' + '?_t=' + Date.now());
    if (ftResp.ok) {
      var ftHtml = await ftResp.text();
      if (ftHtml.indexOf('<tbody>') > 0) {
        var ftEl = document.getElementById('fundFullTable');
        if (ftEl) { ftEl.innerHTML = ftHtml; document.getElementById('fundFullTableCard').style.display = ''; }
      }
    }
  } catch(e) {}
}

async function loadHeartbeat() {
  const r = await fetch(API + '/api/heartbeat');
  const d = await r.json();
  if (!d.ok) return;
  const hb = d.heartbeats || {};
  // 给每个正在运行的任务的行加一个"运行中"标记
  document.querySelectorAll('.feature-row').forEach(row => {
    const name = row.dataset.taskId;
    if (name && hb[name]) {
      row.querySelector('.feature-running').textContent = '▶ 运行中';
      row.querySelector('.feature-running').style.display = 'inline';
    } else if (name) {
      row.querySelector('.feature-running').textContent = '';
      row.querySelector('.feature-running').style.display = 'none';
    }
  });
}
setInterval(loadFeatures, 30000);

async function loadBriefing() {
  const r = await fetch(API + '/api/briefing', { method: 'GET' });
  if (!r.ok) return;
  const html = await r.text();
  const el = document.getElementById('briefContent');
  if (el) el.innerHTML = html;
  // 从内容中提取日期更新右上角
  const dateMatch = html.match(/(\d{4}-\d{2}-\d{2})/);
  const dateEl = document.getElementById('briefDate');
  if (dateEl) dateEl.textContent = dateMatch ? dateMatch[1] : '已生成';
}

async function runBriefing() {
  const btn = document.getElementById('briefBtn');
  const prog = document.getElementById('briefProgress');
  if (btn) { btn.disabled = true; }
  const startTime = Date.now();
  const MAX_WAIT = 600000; // 10min
  const r = await fetch(API + '/api/briefing', { method: 'POST' });
  const d = await r.json();
  if (d.ok) {
    const poll = setInterval(async () => {
      try {
        const hb = await fetch(API + '/api/heartbeat').then(r => r.json());
        const data = hb.heartbeats?.fund_briefing;
        const alive = hb.alive?.fund_briefing;
        if (data?.total > 0) {
          const pct = Math.round(data.progress / data.total * 100);
          if (btn) btn.textContent = `⏳ 晚报 ${data.status||''} ${pct}%`;
          if (prog) prog.style.width = pct + '%';
        } else if (alive) {
          if (btn) btn.textContent = `⏳ 晚报 ${data?.status||'启动中'}`;
          if (prog) prog.style.width = data?.status ? '10%' : '5%';
        }
        if (!alive) {
          clearInterval(poll);
          loadBriefing();
          loadFeatures();
          if (btn) { btn.disabled = false; btn.textContent = '📊 生成晚报'; }
          if (prog) prog.style.width = '0%';
        }
      } catch(e) { /* 网络错误时忽略，下次轮询继续 */ }
      if (Date.now() - startTime > MAX_WAIT) {
        clearInterval(poll);
        if (btn) { btn.disabled = false; btn.textContent = '📊 生成晚报'; }
        if (prog) prog.style.width = '0%';
        showMsg('晚报生成超时', 'fail');
      }
    }, 3000);
  } else {
    if (btn) { btn.disabled = false; btn.textContent = '📊 生成晚报'; }
    showMsg('✖ ' + (d.error || '发起失败'), 'fail');
  }
}

// 页面加载时检查晚报是否正在生成
async function checkBriefRunning() {
  const r = await fetch(API + '/api/heartbeat');
  const d = await r.json();
  if (!d.ok) return;
  const btn = document.getElementById('briefBtn');
  const prog = document.getElementById('briefProgress');
  const data = d.heartbeats?.fund_briefing;
  if (d.alive?.fund_briefing && data) {
    if (btn) { btn.disabled = true; }
    const pct = data.total > 0 ? Math.round(data.progress / data.total * 100) : 0;
    if (btn) btn.textContent = `⏳ 晚报 ${data.status||''} ${pct}%`;
    if (prog) prog.style.width = pct + '%';
    setTimeout(checkBriefRunning, 10000);
  } else {
    if (prog) prog.style.width = '0%';
  }
}

// 把后端返回的 curve 转成 JS 断点数组，没有则用默认
function _getCurvePoints(dimKey, serverCurve) {
  if (serverCurve && serverCurve.points && serverCurve.points.length >= 2) {
    return serverCurve.points;
  }
  var def = _DEFAULT_CURVES[dimKey];
  return def ? def.map(function(p){ return [p[0], p[1]]; }) : [[0,0],[100,100]];
}

// 曲线图表状态注册表（避免重复绑定事件）
_curveChartState = {};
_curveDragInited = false;
_curveDragData = null;
// 全局级拖拽事件（只绑一次）
document.addEventListener('mousemove', function(evt) {
  if (!_curveDragData) return;
  var st = _curveChartState[_curveDragData.key];
  if (!st) return;
  var rect = st.svg.getBoundingClientRect();
  var scX = st.W / rect.width, scY = st.H / rect.height;
  var mx = (evt.clientX - rect.left) * scX;
  var my = (evt.clientY - rect.top) * scY;
  var idx = _curveDragData.idx;
  function rx2(px) { return Math.round((st.xMin + (px - st.pad.l) / (st.W - st.pad.l - st.pad.r) * (st.xMax - st.xMin)) * 100) / 100; }
  function ry2(py) { return Math.max(0, Math.min(100, Math.round((st.yMax - (py - st.pad.t) / (st.H - st.pad.t - st.pad.b) * (st.yMax - st.yMin)) * 100) / 100)); }
  var newX = rx2(mx);
  var newY = ry2(my);
  if (idx > 0) { var pv = st.pts[idx-1][0]; if (newX < pv) newX = pv; }
  if (idx < st.pts.length - 1) { var nv = st.pts[idx+1][0]; if (newX > nv) newX = nv; }
  st.pts[idx] = [newX, newY];
  if (st.inputsList && st.inputsList[idx]) {
    st.inputsList[idx].xInp.value = newX;
    st.inputsList[idx].yInp.value = newY;
  }
  markDimsDirty();
  // 拖拽重绘（不重建DOM）
  var pathD = st.pts.map(function(p, i) { return (i === 0 ? 'M' : 'L') + st.sx(p[0]).toFixed(1) + ',' + st.sy(p[1]).toFixed(1); }).join(' ');
  st.path.setAttribute('d', pathD);
  st.circles.forEach(function(c, i) {
    if (i < st.pts.length) { c.setAttribute('cx', st.sx(st.pts[i][0]).toFixed(1)); c.setAttribute('cy', st.sy(st.pts[i][1]).toFixed(1)); }
  });
  st.labels.forEach(function(t, i) {
    if (i < st.pts.length) { t.setAttribute('x', st.sx(st.pts[i][0]).toFixed(1)); t.textContent = st.pts[i][0]; }
  });
});
document.addEventListener('mouseup', function() {
  if (_curveDragData) {
    var st = _curveChartState[_curveDragData.key];
    if (st && st.svg) st.svg.style.cursor = '';
    _curveDragData = null;
  }
});

function drawCurvePreview(key) {
  var container = document.getElementById('curve-preview-' + key);
  if (!container) return;
  var tbl = document.getElementById('curve-tbl-' + key);
  if (!tbl) return;
  // 读取断点数据
  var pts = [];
  var inputsList = [];
  var rows = tbl.querySelectorAll('tr');
  for (var i = 0; i < rows.length; i++) {
    var inputs = rows[i].querySelectorAll('input[type=number]');
    if (inputs.length >= 2) {
      var x = parseFloat(inputs[0].value);
      var y = parseFloat(inputs[1].value);
      if (!isNaN(x) && !isNaN(y)) { pts.push([x, y]); inputsList.push({xInp:inputs[0], yInp:inputs[1]}); }
    }
  }
  if (pts.length < 2) { container.innerHTML = ''; return; }
  var W = 560, H = 200, pad = {t:14, r:12, b:26, l:42};
  var xMin = pts[0][0], xMax = pts[pts.length - 1][0];
  var yMin = 0, yMax = 100;
  if (xMax === xMin) xMax = xMin + 1;
  function sv(v, lo, hi, a, b) { return a + (v - lo) / (hi - lo) * (b - a); }
  function sx(v) { return sv(v, xMin, xMax, pad.l, W - pad.r); }
  function sy(v) { return sv(v, yMax, yMin, pad.t, H - pad.b); }
  function rx(px) { return Math.round((xMin + (px - pad.l) / (W - pad.l - pad.r) * (xMax - xMin)) * 100) / 100; }
  function ry(py) { return Math.max(0, Math.min(100, Math.round((yMax - (py - pad.t) / (H - pad.t - pad.b) * (yMax - yMin)) * 100) / 100)); }
  var svgId = 'curve-svg-' + key;

  // 创建/重建完整 SVG
  var pathD = pts.map(function(p, i) { return (i === 0 ? 'M' : 'L') + sx(p[0]).toFixed(1) + ',' + sy(p[1]).toFixed(1); }).join(' ');
  var gridHtml = '';
  for (var g = 0; g <= 100; g += 20) {
    var gy = sy(g);
    gridHtml += '<line x1="' + pad.l + '" y1="' + gy + '" x2="' + (W - pad.r) + '" y2="' + gy + '" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>';
  }
  var dotsHtml = pts.map(function(p, i) {
    return '<circle data-idx="' + i + '" cx="' + sx(p[0]).toFixed(1) + '" cy="' + sy(p[1]).toFixed(1) + '" r="7" fill="#42a5f5" stroke="#fff" stroke-width="2" style="cursor:grab;"/>';
  }).join('');
  var labelsHtml = pts.map(function(p) {
    return '<text class="clbl" x="' + sx(p[0]).toFixed(1) + '" y="' + (H - 3) + '" text-anchor="middle" fill="#aaa" font-size="9" font-family="Consolas">' + p[0] + '</text>';
  }).join('');
  container.innerHTML = '<svg id="' + svgId + '" width="' + W + '" height="' + H + '" viewBox="0 0 ' + W + ' ' + H + '" style="background:rgba(0,0,0,0.3);border-radius:6px;width:100%;">'
    + '<rect x="0" y="0" width="' + W + '" height="' + H + '" fill="none"/>'
    + gridHtml
    + '<path class="cpath" d="' + pathD + '" fill="none" stroke="#42a5f5" stroke-width="2.5" stroke-linejoin="round"/>'
    + dotsHtml
    + '<text x="' + (W - 4) + '" y="14" text-anchor="end" fill="#888" font-size="9" font-family="Consolas">100</text>'
    + '<text x="' + (W - 4) + '" y="' + (H - 6) + '" text-anchor="end" fill="#888" font-size="9" font-family="Consolas">0</text>'
    + labelsHtml
    + '</svg>';

  // 缓存 DOM 引用用于拖拽更新
  var svgEl = document.getElementById(svgId);
  var pathEl = svgEl.querySelector('.cpath');
  var circleEls = svgEl.querySelectorAll('circle');
  var labelEls = svgEl.querySelectorAll('.clbl');
  _curveChartState[key] = {
    svg: svgEl, path: pathEl, circles: circleEls, labels: labelEls,
    pts: pts, inputsList: inputsList,
    W:W, H:H, pad:pad, xMin:xMin, xMax:xMax, yMin:yMin, yMax:yMax,
    sx: sx, sy: sy,
  };

  // mousedown：每个 SVG 独立绑定
  if (!svgEl._dragBound) {
    svgEl._dragBound = true;
    svgEl.addEventListener('mousedown', function(evt) {
      var t = evt.target;
      if (t.tagName === 'circle' && t.hasAttribute('data-idx')) {
        _curveDragData = {idx: parseInt(t.getAttribute('data-idx')), key: key};
        this.style.cursor = 'grabbing';
        evt.preventDefault();
      }
    });
  }
}


async function saveDims() {
  const btn = document.getElementById('dimsSaveBtn');
  const progArea = document.getElementById('saveProgressArea');
  const progFill = document.getElementById('saveProgressFill');
  const progPct = document.getElementById('saveProgressPct');
  const progText = document.getElementById('saveProgressText');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 保存中'; }
  if (progArea) progArea.style.display = '';
  if (progFill) progFill.style.width = '30%';
  if (progPct) progPct.textContent = '30%';
  if (progText) progText.textContent = '正在保存...';
  const rows = document.querySelectorAll('#dimsTable tbody tr');
  const dims = [];
  rows.forEach(function(row) {
    var cb = row.querySelector('input[type=checkbox]');
    if (!cb) return;
    var num = row.querySelector('input[type=number]');
    var key = row.querySelector('td:nth-child(2) span').textContent;
    var name = row.querySelector('td:nth-child(2)').textContent.replace(key,'').trim();
    if (name.endsWith('\n')) name = name.slice(0,-1).trim();
    const desc = row.querySelectorAll('td')[3].textContent;
    var curvePoints = null;
    var curveRow = row.nextElementSibling;
    if (curveRow && curveRow.classList.contains('curve-edit-row')) {
      var inpRows = curveRow.querySelectorAll('table tr');
      var pts = [];
      for (var j = 0; j < inpRows.length; j++) {
        var inputs = inpRows[j].querySelectorAll('input[type=number]');
        if (inputs.length >= 2) {
          var x = parseFloat(inputs[0].value);
          var y = parseFloat(inputs[1].value);
          if (!isNaN(x) && !isNaN(y)) pts.push([x, y]);
        }
      }
      if (pts.length >= 2) curvePoints = {points: pts};
    }
    var cat = DIM_INFO[key]?.cat || '';
    dims.push({name: name, key: key, weight: parseInt(num.value) / 100, enabled: cb.checked, desc: desc, curve: curvePoints, category: cat});
  });
  try {
    if (progFill) progFill.style.width = '60%';
    if (progPct) progPct.textContent = '60%';
    if (progText) progText.textContent = '正在保存...';
    const controller = new AbortController();
    const timeout = setTimeout(function() { controller.abort(); }, 30000);
    const r = await fetch(API + '/api/dims', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({dims: dims}),
      signal: controller.signal,
    });
    clearTimeout(timeout);
    const d = await r.json();
    if (progFill) progFill.style.width = '100%';
    if (progPct) progPct.textContent = '100%';
    if (progText) progText.textContent = '保存完成';
    if (d.ok) {
      showMsg('✔ 权重已保存', 'ok');
      if (btn) { btn.disabled = false; btn.textContent = '💾 保存权重'; btn.style.background = 'linear-gradient(135deg,#66bb6a,#43a047)'; }
      setTimeout(function() {
        if (progArea) progArea.style.display = 'none';
        if (progFill) progFill.style.width = '0%';
        if (progPct) progPct.textContent = '0%';
      }, 2000);
      try { loadDims(); } catch(e) {}
    } else {
      if (progFill) progFill.style.width = '0%';
      if (progPct) progPct.textContent = '0%';
      if (progText) progText.textContent = '';
      if (btn) { btn.disabled = false; btn.textContent = '💾 保存权重'; btn.style.background = 'linear-gradient(135deg,#66bb6a,#43a047)'; }
      showMsg('✖ ' + (d.error || '保存失败'), 'fail');
    }
  } catch(e) {
    if (progFill) progFill.style.width = '0%';
    if (progPct) progPct.textContent = '0%';
    if (progText) progText.textContent = '';
    if (btn) { btn.disabled = false; btn.textContent = '💾 保存权重'; btn.style.background = 'linear-gradient(135deg,#66bb6a,#43a047)'; }
    if (progArea) progArea.style.display = 'none';
    showMsg('✖ 保存失败' + (e.name === 'AbortError' ? '（超时）' : ''), 'fail');
  }
}

async function runRecommendFromFilter() {
  var btn = document.getElementById('recFilterBtn');
  var prog = document.getElementById('recFilterProgress');
  var statusEl = document.getElementById('recFilterStatus');
  if (!btn) return;
  try {
    var topN = parseInt(document.getElementById('recTopN').value) || 200;
    var minY1 = parseInt(document.getElementById('recMinY1').value) || 20;
    var showTop = parseInt(document.getElementById('recShowTop').value) || 20;
    var skipMissing = document.getElementById('recSkipMissingPerf') ? document.getElementById('recSkipMissingPerf').checked : true;
    var skipLimited = document.getElementById('recSkipLimited') ? document.getElementById('recSkipLimited').checked : false;
    var cfgResp = await fetch(API + '/api/recommend-config', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({top_n: topN, min_y1_return: minY1, show_top: showTop, skip_missing_perf: skipMissing, skip_limited: skipLimited}),
    });
    var cfgData = await cfgResp.json();
    if (!cfgData.ok) {
      showMsg('⚠ 筛选参数保存失败: ' + (cfgData.error || '未知错误'), 'fail');
    }
  } catch(e) {
    showMsg('⚠ 筛选参数保存失败: ' + (e.message || e), 'fail');
  }
  if (btn) { btn.disabled = true; btn.textContent = '⏳ 推荐中'; }
  if (prog) prog.style.width = '5%';
  if (statusEl) statusEl.textContent = '启动中...';
  try {
    const r = await fetch(API + '/api/recommend', { method: 'POST' });
    if (!r.ok) {
      // HTTP 错误（非 200），直接显示状态码
      if (btn) { btn.disabled = false; btn.textContent = '▶ 运行推荐'; }
      if (prog) prog.style.width = '0%';
      if (statusEl) statusEl.textContent = '';
      showMsg('✖ 服务错误: HTTP ' + r.status, 'fail');
      return;
    }
    const d = await r.json();
    if (!d.ok) {
      if (btn) { btn.disabled = false; btn.textContent = '▶ 运行推荐'; }
      if (prog) prog.style.width = '0%';
      if (statusEl) statusEl.textContent = '';
      showMsg('✖ ' + (d.error || '启动失败'), 'fail');
      return;
    }
    var startTime = Date.now();
    var MAX_WAIT = 1800000;
    var poll = setInterval(async function() {
      try {
        var hb = await fetch(API + '/api/heartbeat').then(function(r){ return r.json(); });
        var recData = hb.heartbeats && hb.heartbeats.fund_recommend;
        var recAlive = hb.alive && hb.alive.fund_recommend;
        if (recAlive && recData) {
          var pct = recData.total > 0 ? Math.round(recData.progress / recData.total * 100) : 0;
          if (prog) prog.style.width = pct + '%';
          var displayTotal = recData.total || 0;
          if (statusEl) statusEl.textContent = recData.progress + '/' + displayTotal + ' (' + pct + '%) ' + (recData.status || '');
          if (btn) btn.textContent = '⏳ 推荐中 ' + pct + '%';
        } else if (!recAlive) {
          clearInterval(poll);
          if (prog) prog.style.width = '100%';
          if (statusEl) statusEl.textContent = '✔ 推荐完成，刷新表格...';
          if (btn) btn.textContent = '⏳ 刷新表格...';
          // 等一秒确保结果文件已完全写入磁盘
          await new Promise(function(r){ setTimeout(r, 1000); });
          // ---- 并行刷新两张表，按钮保持禁用 ----
          // 同时发起两个请求，节省等待时间
          var tableOk = true;
          var rtPromise = fetch(API + '/api/recommend-table' + '?_t=' + Date.now()).then(function(r){ return r.ok ? r.text() : null; });
          var ftPromise = fetch(API + '/api/fund-table' + '?_t=' + Date.now()).then(function(r){ return r.ok ? r.text() : null; });
          // 表一（快，约1秒）
          if (statusEl) statusEl.textContent = '⏳ 刷新表格 (1/2)...';
          if (btn) btn.textContent = '⏳ 刷新表格 (1/2)';
          try {
            var rtHtml = await rtPromise;
            if (rtHtml && rtHtml.indexOf('<tbody>') > 0) {
              var rtEl = document.getElementById('recommendFullTable');
              if (rtEl) {
                rtEl.innerHTML = rtHtml;
                document.getElementById('recommendFullTableCard').style.display = '';
              }
            } else if (rtHtml) {
              var rtEl = document.getElementById('recommendFullTable');
              if (rtEl) { rtEl.innerHTML = rtHtml; document.getElementById('recommendFullTableCard').style.display = ''; }
            }
          } catch(e) { tableOk = false; }
          // 表二（慢，30秒~3分钟，但请求已提前发起）
          if (statusEl) statusEl.textContent = '⏳ 刷新表格 (2/2)...';
          if (btn) btn.textContent = '⏳ 刷新表格 (2/2)';
          try {
            var ftHtml = await ftPromise;
            if (ftHtml && ftHtml.indexOf('<tbody>') > 0) {
              var ftEl = document.getElementById('fundFullTable');
              if (ftEl) {
                ftEl.innerHTML = ftHtml;
                document.getElementById('fundFullTableCard').style.display = '';
              }
            } else if (ftHtml) {
              var ftEl = document.getElementById('fundFullTable');
              if (ftEl) { ftEl.innerHTML = ftHtml; document.getElementById('fundFullTableCard').style.display = ''; }
            }
          } catch(e) { tableOk = false; }
          // 两表刷新完毕，恢复按钮
          if (btn) { btn.disabled = false; btn.textContent = '▶ 运行推荐'; }
          if (statusEl) statusEl.textContent = tableOk ? '✔ 刷新完成' : '✔ 刷新完成（部分失败）';
          if (prog) prog.style.width = '100%';
          setTimeout(function() {
            if (prog) prog.style.width = '0%';
            if (statusEl && statusEl.textContent.indexOf('刷新完成') >= 0) statusEl.textContent = '';
          }, 4000);
        }
      } catch(e) {}
      if (Date.now() - startTime > MAX_WAIT) {
        clearInterval(poll);
        if (prog) prog.style.width = '0%';
        if (statusEl) statusEl.textContent = '⏰ 超时';
        if (btn) { btn.disabled = false; btn.textContent = '▶ 运行推荐'; }
      }
    }, 2000);
  } catch(e) {
    if (prog) prog.style.width = '0%';
    if (statusEl) statusEl.textContent = '启动失败';
    if (btn) { btn.disabled = false; btn.textContent = '▶ 运行推荐'; }
    showMsg('✖ 启动失败: ' + (e.message || e), 'fail');
  }
}

function showScoreDetail(items) {
  var html = '<div style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;margin:8px 0;font-size:12px;color:#ccc;max-height:80vh;overflow-y:auto;">'
    + '<div style="font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:10px;">\u7ef4\u5ea6\u8bc4\u5206\u660e\u7ec6</div>'
    + '<div style="margin-bottom:10px;padding:8px;background:rgba(0,0,0,0.3);border-radius:6px;">';
  var maxContrib = 0;
  items.forEach(function(item){ var c = item[2] * item[1]; if (c > maxContrib) maxContrib = c; });
  var total = 0, weightSum = 0;
  items.forEach(function(item){
    var name = item[0], score = item[1], weight = item[2], value = item[3];
    var contrib = (value === null || value === undefined) ? 50 * weight : score * weight;
    total += contrib; weightSum += weight;
    var barPct = maxContrib > 0 ? (contrib / maxContrib * 100) : 0;
    var scoreColor = score >= 80 ? '#66bb6a' : score >= 40 ? '#ffa726' : '#ef5350';
    var barColor = score >= 80 ? 'rgba(102,187,106,0.4)' : score >= 40 ? 'rgba(255,167,38,0.4)' : 'rgba(239,83,80,0.4)';
    var valStr = value !== null && value !== undefined ? (typeof value === 'number' ? value.toFixed(2) : value) : '-';
    var barHtml = '<div style="display:flex;align-items:center;gap:6px;margin:2px 0;">'
      + '<div style="flex:0 0 80px;text-align:right;color:#888;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + name + '">' + name + '</div>'
      + '<div style="flex:1;height:14px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;position:relative;">'
      + '<div style="width:' + barPct.toFixed(0) + '%;height:100%;background:' + barColor + ';border-radius:3px;"></div>'
      + '</div>'
      + '<div style="flex:0 0 28px;text-align:right;font-family:Consolas;font-size:10px;font-weight:600;color:' + scoreColor + ';">' + score.toFixed(0) + '</div>'
      + '<div style="flex:0 0 28px;text-align:right;font-family:Consolas;font-size:10px;color:#888;">' + (weight * 100).toFixed(0) + '%</div>'
      + '<div style="flex:0 0 36px;text-align:right;font-family:Consolas;font-size:10px;color:#888;">' + contrib.toFixed(1) + '</div>'
      + '</div>';
    html += barHtml;
  });
  var normTotal = weightSum > 0 ? (total / weightSum).toFixed(1) : '0.0';
  html += '</div>'
    + '<table style="width:100%;border-collapse:collapse;font-size:11px;">'
    + '<thead><tr style="background:#2a2a2a;"><th style="padding:4px 6px;text-align:left;color:#888;border-bottom:1px solid #444;">\u7ef4\u5ea6</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u503c</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u5f97\u5206</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u6743\u91cd</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u8d21\u732e</th></tr></thead><tbody>';
  items.forEach(function(item){
    var name = item[0], score = item[1], weight = item[2], value = item[3];
    var isNull = (value === null || value === undefined);
    var contrib = isNull ? 50 * weight : score * weight;
    var valStr = isNull ? '-' : (typeof value === 'number' ? value.toFixed(2) : value);
    var scoreColor = isNull ? '#ffa726' : (score >= 80 ? '#66bb6a' : score >= 40 ? '#ffa726' : '#ef5350');
    html += '<tr><td style="padding:3px 6px;border-bottom:1px solid #333;color:' + (isNull ? '#888' : '#e0e0e0') + ';">' + name + (isNull ? ' <span style="color:#555;">(中性)</span>' : '') + '</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:' + (isNull ? '#555' : '#888') + ';">' + valStr + '</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:' + scoreColor + ';">' + (isNull ? '50.0' : score.toFixed(1)) + '</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + (weight * 100).toFixed(0) + '%</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + contrib.toFixed(1) + '</td></tr>';
  });
  html += '<tr><td style="padding:4px 6px;border-top:1px solid #555;color:#888;" colspan="2">\u5408\u8ba1</td>'
    + '<td style="padding:4px 6px;text-align:right;border-top:1px solid #555;font-family:Consolas;font-weight:600;color:#66bb6a;">' + normTotal + '</td>'
    + '<td style="padding:4px 6px;text-align:right;border-top:1px solid #555;font-family:Consolas;color:#888;">' + (weightSum * 100).toFixed(0) + '%</td>'
    + '<td style="padding:4px 6px;text-align:right;border-top:1px solid #555;font-family:Consolas;color:#888;">' + total.toFixed(1) + '</td></tr>'
    + '</tbody></table>'
    + '<button id="__closeScoreBtn" style="margin-top:10px;background:#333;border:1px solid #555;border-radius:4px;color:#ccc;padding:4px 12px;cursor:pointer;">\u5173\u95ed</button></div>';
  var el = document.getElementById("scoreDetailModal");
  if (!el) {
    el = document.createElement("div");
    el.id = "scoreDetailModal";
    document.body.appendChild(el);
  }
  el.innerHTML = html;
  var btn = document.getElementById("__closeScoreBtn");
  if (btn) btn.onclick = function(){ el.style.display = "none"; };
  el.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;max-width:520px;width:90%;max-height:90vh;overflow-y:auto;";
}

function showHoldings(code, name) {
  var el = document.getElementById("holdingsModal");
  if (!el) {
    el = document.createElement("div");
    el.id = "holdingsModal";
    document.body.appendChild(el);
  }
  el.innerHTML = '<div style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;font-size:12px;color:#ccc;max-width:480px;">'
    + '<div style="font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:4px;">\ud83d\udcc8 ' + name + ' <span style="color:#666;font-size:11px;">' + code + '</span></div>'
    + '<div style="font-size:11px;color:#555;margin-bottom:10px;">前10大持仓（点击外部关闭）</div>'
    + '<div id="holdingsContent" style="text-align:center;padding:20px;color:#888;">\u23f3 \u52a0\u8f7d\u4e2d...</div>'
    + '</div>';
  el.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;width:90%;max-width:480px;";
  el.onclick = function(){ el.style.display = 'none'; };

  fetch(API + '/api/holdings?code=' + code)
    .then(function(r){ return r.json(); })
    .then(function(d){
      var content = document.getElementById('holdingsContent');
      if (!d.ok || !d.holdings || d.holdings.length === 0) {
        content.innerHTML = '<span style="color:#666;">暂无持仓数据</span>';
        return;
      }
      var tbl = '<table style="width:100%;border-collapse:collapse;font-size:12px;margin-top:4px;">'
        + '<thead><tr style="background:#2a2a2a;"><th style="padding:4px 6px;text-align:left;color:#888;border-bottom:1px solid #444;">股票</th>'
        + '<th style="padding:4px 6px;text-align:center;color:#888;border-bottom:1px solid #444;">代码</th>'
        + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">占比</th>'
        + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">实时涨跌</th></tr></thead><tbody>';
      d.holdings.forEach(function(h){
        var chgStr = '';
        var chgColor = '#888';
        if (h.chg !== null && h.chg !== undefined) {
          chgStr = (h.chg > 0 ? '+' : '') + h.chg.toFixed(2) + '%';
          chgColor = h.chg > 0 ? '#ef5350' : '#66bb6a';
        } else {
          chgStr = '-';
        }
        var stockFullCode = (h.m || 'sz') + h.c;
        tbl += '<tr><td style="padding:3px 6px;border-bottom:1px solid #333;color:#e0e0e0;"><span onclick="showStockInfo(\'' + htmlEscape(h.n || '') + '\',\'' + stockFullCode + '\')" style="cursor:pointer;border-bottom:1px dashed rgba(255,255,255,0.25);" title="点击查看详情">' + htmlEscape(h.n || '') + '</span></td>'
          + '<td style="padding:3px 6px;text-align:center;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + htmlEscape(h.c || '') + '</td>'
          + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#66bb6a;">' + (h.p || 0).toFixed(2) + '%</td>'
          + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:' + chgColor + ';">' + chgStr + '</td></tr>';
      });
      tbl += '</tbody></table>';
      content.innerHTML = tbl;
    })
    .catch(function(){
      var content = document.getElementById('holdingsContent');
      if (content) content.innerHTML = '<span style="color:#ef5350;">加载失败</span>';
    });
}

function showStockInfo(name, fullCode) {
  var el = document.getElementById("stockInfoModal");
  if (!el) {
    el = document.createElement("div");
    el.id = "stockInfoModal";
    document.body.appendChild(el);
  }
  el.innerHTML = '<div style="background:#1a1a2e;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px;font-size:13px;color:#ccc;max-width:420px;box-shadow:0 12px 48px rgba(0,0,0,0.6);">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">'
    + '<div><span style="font-size:16px;font-weight:700;color:#e0e0e0;">' + htmlEscape(name) + '</span>'
    + ' <span style="font-family:Consolas;font-size:12px;color:#666;">' + fullCode + '</span></div>'
    + '<span onclick="document.getElementById(\'stockInfoModal\').style.display=\'none\'" style="cursor:pointer;color:#555;font-size:18px;">&times;</span></div>'
    + '<div id="stockInfoContent" style="text-align:center;padding:20px;color:#888;">\u23f3 \u52a0\u8f7d\u4e2d...</div>'
    + '<div style="margin-top:10px;font-size:11px;color:#444;text-align:center;">点击外部关闭</div>'
    + '</div>';
  el.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:99999;width:90%;max-width:400px;";
  el.onclick = function(){ el.style.display = 'none'; };

  fetch(API + '/api/stock-info?code=' + encodeURIComponent(fullCode))
    .then(function(r){ return r.json(); })
    .then(function(d){
      var content = document.getElementById('stockInfoContent');
      if (!d.ok || !d.data) {
        content.innerHTML = '<span style="color:#666;">暂无数据</span>';
        return;
      }
      var s = d.data;
      function _fmt(v, unit, dec) {
        if (v === null || v === undefined || v === '') return '-';
        if (dec !== undefined && typeof v === 'number') return v.toFixed(dec) + (unit||'');
        return v + (unit||'');
      }
      function _chgClass(v) { return v > 0 ? '#ef5350' : v < 0 ? '#66bb6a' : '#bbb'; }
      var chgColor = _chgClass(s.change_pct);
      var html = ''
        // ── 价格区 ──
        + '<div style="text-align:center;padding:8px 0 10px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:6px;">'
        + '<span style="font-size:28px;font-weight:700;color:#e0e0e0;">' + _fmt(s.price, '', 2) + '</span>'
        + ' <span style="font-size:16px;color:' + chgColor + ';font-weight:600;">' + (s.change_pct > 0 ? '+' : '') + _fmt(s.change_pct, '%', 2) + '</span>'
        + ' <span style="font-size:13px;color:' + chgColor + ';">' + (s.change_amt > 0 ? '+' : '') + _fmt(s.change_amt, '', 2) + '</span>'
        + '</div>'
        // ── 今日行情 ──
        + '<div style="font-size:11px;color:#666;padding:2px 0 4px;">📊 今日行情</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 16px;">'
        + '<div style="color:#888;font-size:12px;">最高</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.high, '', 2) + '</div>'
        + '<div style="color:#888;font-size:12px;">最低</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.low, '', 2) + '</div>'
        + '<div style="color:#888;font-size:12px;">今开</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.open, '', 2) + '</div>'
        + '<div style="color:#888;font-size:12px;">昨收</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.prev_close, '', 2) + '</div>'
        + '<div style="color:#888;font-size:12px;">振幅</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.amplitude, '%', 2) + '</div>'
        + '</div>'
        // ── 成交量 ──
        + '<div style="border-top:1px solid rgba(255,255,255,0.04);margin:6px 0 4px;"></div>'
        + '<div style="font-size:11px;color:#666;padding:2px 0 4px;">📈 成交量</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 16px;">'
        + '<div style="color:#888;font-size:12px;">成交量</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.volume, '手') + '</div>'
        + '<div style="color:#888;font-size:12px;">成交额</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.amount, '万') + '</div>'
        + '<div style="color:#888;font-size:12px;">外盘</div><div style="text-align:right;font-family:Consolas;color:#66bb6a;font-size:12px;">' + _fmt(s.buy_volume, '手') + '</div>'
        + '<div style="color:#888;font-size:12px;">内盘</div><div style="text-align:right;font-family:Consolas;color:#ef5350;font-size:12px;">' + _fmt(s.sell_volume, '手') + '</div>'
        + '<div style="color:#888;font-size:12px;">换手率</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.turnover_rate, '%', 2) + '</div>'
        + '</div>'
        // ── 估值与市值 ──
        + '<div style="border-top:1px solid rgba(255,255,255,0.04);margin:6px 0 4px;"></div>'
        + '<div style="font-size:11px;color:#666;padding:2px 0 4px;">💰 估值与市值</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 16px;">'
        + '<div style="color:#888;font-size:12px;">市盈率(PE)</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.pe, '', 2) + '</div>'
        + '<div style="color:#888;font-size:12px;">总市值</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.market_cap, '亿') + '</div>'
        + '<div style="color:#888;font-size:12px;">流通市值</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.float_market_cap, '亿') + '</div>'
        + '</div>'
        // ── 区间表现 ──
        + '<div style="border-top:1px solid rgba(255,255,255,0.04);margin:6px 0 4px;"></div>'
        + '<div style="font-size:11px;color:#666;padding:2px 0 4px;">📅 区间表现</div>'
        + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px 16px;">'
        + '<div style="color:#888;font-size:12px;">52周最高</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.high_52w, '', 2) + '</div>'
        + '<div style="color:#888;font-size:12px;">52周最低</div><div style="text-align:right;font-family:Consolas;color:#e0e0e0;font-size:12px;">' + _fmt(s.low_52w, '', 2) + '</div>'
        + '<div style="color:#888;font-size:12px;">60日涨跌</div><div style="text-align:right;font-family:Consolas;color:' + _chgClass(s.chg_60d) + ';font-size:12px;">' + (s.chg_60d > 0 ? '+' : '') + _fmt(s.chg_60d, '%', 2) + '</div>'
        + '</div>';
      content.innerHTML = html;
    })
    .catch(function(){
      var content = document.getElementById('stockInfoContent');
      if (content) content.innerHTML = '<span style="color:#ef5350;">加载失败</span>';
    });
}

</script>
