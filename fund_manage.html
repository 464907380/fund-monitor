<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>基金管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0a0a0f 0%, #141428 50%, #0d0d1a 100%);
  color: #ccc;
  font-family: 'Helvetica Neue','PingFang SC','Microsoft YaHei',Arial,sans-serif;
  font-size: 14px; min-height: 100vh;
}
.container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

/* 标题 */
header { text-align: center; margin-bottom: 28px; }
h1 {
  font-size: 26px; font-weight: 700; letter-spacing: 2px;
  background: linear-gradient(90deg, #66bb6a, #42a5f5);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle { font-size: 13px; color: #666; margin-top: 4px; letter-spacing: 4px; }

/* 卡片 */
.card {
  background: rgba(26,26,40,0.85);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  overflow: visible;
}

/* 添加区域卡片（浮在列表上方） */
.add-card { position: relative; z-index: 10; }
.add-section label {
  display: block; font-size: 13px; color: #888; margin-bottom: 8px;
  letter-spacing: 1px;
}
.add-row { display: flex; gap: 10px; }
/* 搜索建议 */
.search-wrap { position: relative; flex: 1; }
.search-wrap input {
  width: 100%; background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  color: #e0e0e0; padding: 10px 14px; font-size: 15px; outline: none;
  transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: #66bb6a; box-shadow: 0 0 0 2px rgba(102,187,106,0.15); }
.search-wrap input::placeholder { color: #444; }
.suggestions {
  position: absolute; top: 100%; left: 0; right: 0; z-index: 9999;
  background: #1a1a2e; border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; margin-top: 4px; max-height: 240px; overflow-y: auto;
  display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
}
.suggestions.show { display: block; }
.suggestions .item {
  padding: 10px 14px; cursor: pointer; display: flex; justify-content: space-between;
  align-items: center; transition: background 0.1s;
}
.suggestions .item:hover { background: rgba(102,187,106,0.1); }
.suggestions .item .scode { font-family: Consolas,monospace; font-size: 12px; color: #666; }
.suggestions .item .sname { font-size: 14px; color: #ccc; }
.add-row button {
  background: linear-gradient(135deg, #66bb6a, #43a047);
  color: #fff; border: none; border-radius: 8px;
  padding: 10px 22px; font-size: 14px; cursor: pointer; font-weight: 600;
  transition: transform 0.15s, box-shadow 0.15s;
}
.add-row button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102,187,106,0.3); }
.add-row button:active { transform: translateY(0); }

/* 列表 */
.list-header {
  display: flex; justify-content: space-between; align-items: center;
  padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.06);
  font-size: 14px; color: #888; letter-spacing: 1px;
}
.list-header .count { color: #888; font-weight: 600; }

/* 基金行 */
.fund-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: background 0.15s;
}
.fund-row:last-child { border-bottom: none; }
.fund-row:hover { background: rgba(255,255,255,0.02); border-radius: 6px; }

.fund-row .info { display: flex; flex-direction: column; gap: 2px; }
.fund-row .code {
  font-family: 'SF Mono','Consolas','Liberation Mono',monospace;
  font-size: 13px; color: #555; letter-spacing: 1px;
}
.fund-row .name {
  font-size: 14px; font-weight: 600; color: #e8e8e8;
  letter-spacing: 0.5px;
}

.fund-row .del-btn {
  background: rgba(239,83,80,0.1);
  border: 1px solid rgba(239,83,80,0.25);
  border-radius: 6px;
  color: #ef5350; padding: 6px 14px; font-size: 12px; cursor: pointer;
  transition: all 0.15s; font-weight: 500;
}
.fund-row .del-btn:hover {
  background: #ef5350; color: #fff; border-color: #ef5350;
  box-shadow: 0 2px 8px rgba(239,83,80,0.3);
}

/* 消息 */
.msg {
  padding: 12px 16px; border-radius: 8px; margin-bottom: 16px;
  font-size: 13px; display: none; animation: fadeIn 0.2s;
}
.msg.ok {
  display: block;
  background: rgba(102,187,106,0.1);
  color: #81c784;
  border: 1px solid rgba(102,187,106,0.2);
}
.msg.err {
  display: block;
  background: rgba(239,83,80,0.1);
  color: #ef9a9a;
  border: 1px solid rgba(239,83,80,0.2);
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 功能概览 */
.feature-list { }
.feature-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 4px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.feature-row:last-child { border-bottom: none; }
.feature-row:hover { background: rgba(255,255,255,0.02); border-radius: 6px; }
.feature-icon { font-size: 22px; width: 32px; text-align: center; flex-shrink: 0; }
.feature-body { flex: 1; min-width: 0; }
.feature-name { font-size: 15px; font-weight: 600; color: #e0e0e0; }
.feature-desc { font-size: 13px; color: #777; margin-top: 2px; line-height: 1.5; }
.feature-info { font-size: 12px; color: #666; margin-top: 2px; }
.feature-meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.feature-time { font-size: 12px; color: #666; white-space: nowrap; font-family: Consolas,monospace; letter-spacing: 0.5px; }
.feature-status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.feature-status.ok { background: #66bb6a; box-shadow: 0 0 6px rgba(102,187,106,0.5); }
.feature-status.fail { background: #ef5350; box-shadow: 0 0 6px rgba(239,83,80,0.5); }
.empty {
  text-align: center; padding: 48px 16px;
  color: #555; font-size: 15px; letter-spacing: 1px;
}

/* 底部信息 */
.footer {
  text-align: center; font-size: 11px; color: #333;
  margin-top: 24px; letter-spacing: 2px;
}

/* 删除确认弹窗美化 */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  justify-content: center; align-items: center; z-index: 100;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: #1e1e30; border: 1px solid rgba(255,255,255,0.08);
  border-radius: 12px; padding: 24px; max-width: 360px; width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.modal-box p { margin-bottom: 20px; color: #ccc; font-size: 15px; text-align: center; }
.modal-box .code-big {
  display: block; font-size: 22px; font-weight: 700;
  color: #e0e0e0; text-align: center; margin-bottom: 4px;
  font-family: Consolas, monospace;
}
.modal-box .name-big {
  display: block; font-size: 13px; color: #777; text-align: center; margin-bottom: 16px;
}
.modal-actions { display: flex; gap: 10px; }
.modal-actions button {
  flex: 1; padding: 10px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.modal-actions .btn-cancel {
  background: rgba(255,255,255,0.05); color: #999;
  border: 1px solid rgba(255,255,255,0.08);
}
.modal-actions .btn-cancel:hover { background: rgba(255,255,255,0.1); }
.modal-actions .btn-confirm {
  background: linear-gradient(135deg, #ef5350, #e53935); color: #fff;
}
.modal-actions .btn-confirm:hover { box-shadow: 0 4px 12px rgba(239,83,80,0.3); }

/* 渐变分割线 */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(102,187,106,0.2), rgba(66,165,245,0.2), transparent);
  margin: 8px 0 16px;
}

/* 顶部工具栏 */
.toolbar {
  display: flex;
  gap: 10px;
  padding: 12px 16px;
  background: rgba(255,255,255,0.03);
  border-radius: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.toolbar-btn-wrap {
  position: relative;
  overflow: hidden;
  border-radius: 6px;
  flex: 0 1 auto;
}
.toolbar-btn {
  padding: 8px 18px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.toolbar-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.toolbar-btn.blue { background: linear-gradient(135deg,#42a5f5,#1e88e5); color: #fff; }
.toolbar-btn.green { background: linear-gradient(135deg,#66bb6a,#43a047); color: #fff; }
.btn-progress {
  position: absolute;
  bottom: 0;
  left: 0;
  height: 3px;
  width: 0%;
  background: linear-gradient(90deg, #66bb6a, #42a5f5);
  transition: width 0.5s ease;
  border-radius: 0 0 6px 6px;
}
.btn-progress.pulse {
  width: 30%;
  animation: pulseWidth 1.5s ease-in-out infinite;
}
@keyframes pulseWidth {
  0% { width: 10%; opacity: 0.6; }
  50% { width: 60%; opacity: 1; }
  100% { width: 10%; opacity: 0.6; }
}
</style>
</head>
<body>
<div class="container" id="app">

  <header>
    <h1>📋 基金监控</h1>
    <div class="subtitle">FUND WATCH MANAGER</div>
  </header>

  <div id="msg" class="msg"></div>

  <!-- 顶部工具栏 -->
  <div class="toolbar">
    <div class="toolbar-btn-wrap">
      <button onclick="runBriefing()" id="briefBtn" class="toolbar-btn blue">📊 生成晚报</button>
      <div class="btn-progress" id="briefProgress"></div>
    </div>
  </div>


  <div class="card">
    <div class="list-header">
      <span>📊 基金晚报</span>
      <span class="count" id="briefDate" style="font-size:12px;">未生成</span>
    </div>
    <div class="divider"></div>
    <div id="briefContent" style="padding:0;font-size:12px;color:#ccc;"></div>
  </div>

  <div class="card">
    <div class="list-header">
      <span>⚙️ 评分维度</span>
    </div>
    <div class="divider"></div>
    <div id="dimsList" style="font-size:12px;"></div>
    <div style="padding:12px 4px 0;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;align-items:center;">
      <button onclick="saveDims()" id="dimsSaveBtn" style="background:linear-gradient(135deg,#66bb6a,#43a047);border:none;border-radius:6px;color:#fff;padding:8px 20px;font-size:13px;cursor:pointer;" class="dims-save-btn">💾 保存权重</button>
      <button onclick="resetDims()" style="background:rgba(255,255,255,0.08);color:#ccc;border:1px solid rgba(255,255,255,0.15);border-radius:6px;padding:8px 20px;font-size:13px;cursor:pointer;">重置</button>
    </div>
    <div id="saveProgressArea" style="padding:6px 4px 2px;display:none;">
      <div style="display:flex;align-items:center;gap:8px;font-size:11px;color:#888;">
        <div style="flex:1;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;">
          <div id="saveProgressFill" style="width:0%;height:100%;background:linear-gradient(90deg,#66bb6a,#42a5f5);border-radius:3px;transition:width 0.5s;"></div>
        </div>
        <span id="saveProgressPct" style="font-family:Consolas;min-width:36px;text-align:right;">0%</span>
      </div>
      <div id="saveProgressText" style="font-size:11px;color:#888;padding:2px 0 0;"></div>
    </div>
    <div style="padding:2px 4px 0;font-size:11px;color:#555;text-align:center;">· 取消勾选 = 关闭维度，保存后下次评分生效</div>

    <div class="divider" style="margin:12px 0 8px;"></div>
    <div style="padding:0 4px;">
      <div style="font-size:13px;font-weight:600;color:#ccc;margin-bottom:8px;">🔍 全市场筛选</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;align-items:center;font-size:12px;">
        <label style="color:#888;">拉取数量
          <input type="number" id="recTopN" value="200" min="50" max="500" style="width:70px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e0e0;padding:4px 8px;margin-left:4px;font-family:Consolas;">
        </label>
        <label style="color:#888;">最低近1年收益
          <input type="number" id="recMinY1" value="20" min="0" max="100" style="width:60px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e0e0;padding:4px 8px;margin-left:4px;font-family:Consolas;"> %
        </label>
        <label style="color:#888;display:flex;align-items:center;gap:4px;">
          <input type="checkbox" id="recExcludeNeg" checked> 剔除负收益
        </label>
        <label style="color:#888;">展示条数
          <input type="number" id="recShowTop" value="20" min="5" max="50" style="width:60px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:#e0e0e0;padding:4px 8px;margin-left:4px;font-family:Consolas;">
        </label>
      </div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <button onclick="runRecommendFromFilter()" id="recFilterBtn" style="background:linear-gradient(135deg,#42a5f5,#1e88e5);border:none;border-radius:6px;color:#fff;padding:8px 20px;font-size:13px;cursor:pointer;">▶ 运行推荐</button>
        <div style="flex:1;max-width:200px;">
          <div style="height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;">
            <div id="recFilterProgress" style="width:0%;height:100%;background:linear-gradient(90deg,#66bb6a,#42a5f5);border-radius:2px;transition:width 0.5s;"></div>
          </div>
        </div>
        <span id="recFilterStatus" style="font-size:11px;color:#888;"></span>
      </div>
    </div>
  </div>

  <div class="card add-card">
    <div class="add-section">
      <label>✦ 添加基金（多个用空格/逗号分隔）</label>
      <div class="add-row">
        <div class="search-wrap">
          <input id="addInput" type="text" placeholder="输入代码或名称搜索…" autocomplete="off" spellcheck="false">
          <div class="suggestions" id="suggestions"></div>
        </div>
        <button onclick="addFunds()">添加</button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="list-header">
      <span>监控列表</span>
      <span class="count" id="count">0 只</span>
    </div>
    <div class="divider"></div>
    <div id="list"></div>
  </div>


  <div class="card">
    <div class="list-header">
      <span>功能概览</span>
    </div>
    <div class="divider"></div>
    <div id="features"></div>
  </div>

</div>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <span class="code-big" id="modalCode"></span>
    <span class="name-big" id="modalName"></span>
    <p>确定从监控中移除吗？</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="confirmRemove()">确认移除</button>
    </div>
  </div>
</div>

<script>
const API = '';
let funds = [];
let pendingCode = null;

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.animation = 'none';
  el.offsetHeight;
  el.style.animation = 'fadeIn 0.2s';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

function htmlEscape(s) {
  if (typeof s !== 'string') return s;
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

async function loadList() {
  const r = await fetch(API + '/api/list');
  const d = await r.json();
  funds = d.funds || [];
  render();
}

function render() {
  const el = document.getElementById('list');
  document.getElementById('count').textContent = funds.length + ' 只';
  if (!funds.length) {
    el.innerHTML = '<div class="empty">暂无监控基金</div>';
    return;
  }
  el.innerHTML = funds.map(f => {
    const name = htmlEscape(f.name || '');
    const code = htmlEscape(f.code || '');
    return `<div class="fund-row">
      <div class="info">
        <span class="name">${name || code}</span>
        <span class="code">${name ? code : ''}</span>
      </div>
      <button class="del-btn" onclick="openModal('${htmlEscape(f.code)}', '${htmlEscape(f.name || '')}')">删除</button>
    </div>`;
  }).join('');
}

async function addFunds() {
  const input = document.getElementById('addInput');
  const raw = input.value.trim();
  if (!raw) return;
  const codes = raw.split(/[\s,，、;；]+/).filter(Boolean);
  const r = await fetch(API + '/api/add', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ codes }),
  });
  const d = await r.json();
  input.value = '';
  if (d.ok) {
    const parts = [];
    if (d.added.length) parts.push('✅ 添加 ' + d.added.join(', '));
    if (d.skipped.length) parts.push('⏭️ 已存在 ' + d.skipped.join(', '));
    if (d.invalid.length) parts.push('⚠️ 格式错误 ' + d.invalid.join(', '));
    showMsg(parts.join('；') + `（当前 ${d.total} 只）`, 'ok');
    await loadList();
  } else {
    showMsg('❌ ' + (d.error || '添加失败'), 'err');
  }
}

function openModal(code, name) {
  pendingCode = code;
  document.getElementById('modalCode').textContent = code;
  document.getElementById('modalName').textContent = name;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  pendingCode = null;
  document.getElementById('modal').classList.remove('show');
}

async function confirmRemove() {
  if (!pendingCode) return;
  const code = pendingCode;
  closeModal();
  const r = await fetch(API + '/api/remove', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ codes: [code] }),
  });
  const d = await r.json();
  if (d.ok) {
    showMsg('已移除 ' + code + '（当前 ' + d.total + ' 只）', 'ok');
    await loadList();
  } else {
    showMsg('❌ ' + (d.error || '移除失败'), 'err');
  }
}

document.getElementById('addInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addFunds();
});

// 搜索建议
let searchTimer = null;
document.getElementById('addInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { closeSuggestions(); return; }
  searchTimer = setTimeout(async () => {
    const r = await fetch(API + '/api/search?q=' + encodeURIComponent(q));
    const d = await r.json();
    showSuggestions(d.results || []);
  }, 200);
});

document.getElementById('addInput').addEventListener('blur', () => {
  setTimeout(closeSuggestions, 200);
});
document.getElementById('addInput').addEventListener('focus', e => {
  if (e.target.value.trim()) {
    e.target.dispatchEvent(new Event('input'));
  }
});

function showSuggestions(results) {
  const el = document.getElementById('suggestions');
  if (!results.length) { el.classList.remove('show'); return; }
  el.innerHTML = results.map(r => `
    <div class="item" data-code="${r.code}" data-name="${r.name.replace(/"/g,'&quot;')}">
      <span class="sname">${r.name}</span>
      <span class="scode">${r.code}</span>
    </div>
  `).join('');
  el.classList.add('show');
  // 点击选中
  el.querySelectorAll('.item').forEach(item => {
    item.addEventListener('click', () => {
      const code = item.dataset.code;
      const name = item.dataset.name;
      document.getElementById('addInput').value = code;
      closeSuggestions();
    });
  });
}

function closeSuggestions() {
  document.getElementById('suggestions').classList.remove('show');
}

loadList();

async function loadFeatures() {
  const r = await fetch(API + '/api/tasks');
  const d = await r.json();
  if (!d.ok) return;
  const el = document.getElementById('features');
  el.innerHTML = d.tasks.map(t => {
    const running = t.running;
    const statusClass = running ? 'ok' : 'unknown';
    const statusText = running ? '运行中' : (t.last_result === '0' ? '上次成功' : t.last_result ? '上次失败' : '');
    return `
      <div class="feature-row" data-task-id="${t.id}">
        <div class="feature-icon">${t.icon}</div>
        <div class="feature-body">
          <div class="feature-name">${t.label}</div>
          <div class="feature-desc">${t.desc || ''}</div>
          <div class="feature-info">${statusText}${t.next_run ? ' · 下次 ' + t.next_run : ''}</div>
        </div>
        <div class="feature-meta">
          <span class="feature-time">${t.time}</span>
          <span class="feature-status ${statusClass}"></span>
        </div>
      </div>
    `;
  }).join('');
}


var lastBriefingMtime = 0;
function updateHeartbeat() {
  fetch(API + '/api/heartbeat').then(r => r.json()).then(d => {
    if (!d.ok) return;
    const hb = d.heartbeats || {};
    document.querySelectorAll('.feature-row').forEach(row => {
      const name = row.dataset.taskId;
      const el = row.querySelector('.feature-running');
      if (name && hb[name]) {
        el.textContent = '  ▶ 运行中';
        el.style.display = 'inline';
      } else if (el) {
        el.textContent = '';
        el.style.display = 'none';
      }
    });
    
    if (lastBriefingMtime > 0 && d.briefing_mtime && d.briefing_mtime !== lastBriefingMtime) {
      loadBriefing();
    }
    if (d.briefing_mtime) { lastBriefingMtime = d.briefing_mtime; }
  });
}

setInterval(updateHeartbeat, 10000);

async function loadHeartbeat() {
  const r = await fetch(API + '/api/heartbeat');
  const d = await r.json();
  if (!d.ok) return;
  const hb = d.heartbeats || {};
  // 给每个正在运行的任务的行加一个"运行中"标记
  document.querySelectorAll('.feature-row').forEach(row => {
    const name = row.dataset.taskId;
    if (name && hb[name]) {
      row.querySelector('.feature-running').textContent = '▶ 运行中';
      row.querySelector('.feature-running').style.display = 'inline';
    } else if (name) {
      row.querySelector('.feature-running').textContent = '';
      row.querySelector('.feature-running').style.display = 'none';
    }
  });
}

async function loadBriefing() {
  const r = await fetch(API + '/api/briefing', { method: 'GET' });
  if (!r.ok) return;
  const html = await r.text();
  const el = document.getElementById('briefContent');
  if (el) el.innerHTML = html;
  // 从内容中提取日期更新右上角
  const dateMatch = html.match(/(\d{4}-\d{2}-\d{2})/);
  const dateEl = document.getElementById('briefDate');
  if (dateEl) dateEl.textContent = dateMatch ? dateMatch[1] : '已生成';
}

async function runBriefing() {
  const btn = document.getElementById('briefBtn');
  const prog = document.getElementById('briefProgress');
  if (btn) { btn.disabled = true; }
  const startTime = Date.now();
  const MAX_WAIT = 600000; // 10min
  const r = await fetch(API + '/api/briefing', { method: 'POST' });
  const d = await r.json();
  if (d.ok) {
    const poll = setInterval(async () => {
      try {
        const hb = await fetch(API + '/api/heartbeat').then(r => r.json());
        const data = hb.heartbeats?.fund_briefing;
        const alive = hb.alive?.fund_briefing;
        if (data?.total > 0) {
          const pct = Math.round(data.progress / data.total * 100);
          if (btn) btn.textContent = `⏳ 晚报 ${data.status||''} ${pct}%`;
          if (prog) prog.style.width = pct + '%';
        } else if (alive) {
          if (btn) btn.textContent = `⏳ 晚报 ${data?.status||'启动中'}`;
          if (prog) prog.style.width = data?.status ? '10%' : '5%';
        }
        if (!alive) {
          clearInterval(poll);
          loadBriefing();
          loadFeatures();
          if (btn) { btn.disabled = false; btn.textContent = '📊 生成晚报'; }
          if (prog) prog.style.width = '0%';
        }
      } catch(e) { /* 网络错误时忽略，下次轮询继续 */ }
      if (Date.now() - startTime > MAX_WAIT) {
        clearInterval(poll);
        if (btn) { btn.disabled = false; btn.textContent = '📊 生成晚报'; }
        if (prog) prog.style.width = '0%';
        showMsg('晚报生成超时', 'fail');
      }
    }, 3000);
  } else {
    if (btn) { btn.disabled = false; btn.textContent = '📊 生成晚报'; }
    showMsg('✖ ' + (d.error || '发起失败'), 'fail');
  }
}

// 页面加载时检查晚报是否正在生成
async function checkBriefRunning() {
  const r = await fetch(API + '/api/heartbeat');
  const d = await r.json();
  if (!d.ok) return;
  const btn = document.getElementById('briefBtn');
  const prog = document.getElementById('briefProgress');
  const data = d.heartbeats?.fund_briefing;
  if (d.alive?.fund_briefing && data) {
    if (btn) { btn.disabled = true; }
    const pct = data.total > 0 ? Math.round(data.progress / data.total * 100) : 0;
    if (btn) btn.textContent = `⏳ 晚报 ${data.status||''} ${pct}%`;
    if (prog) prog.style.width = pct + '%';
    setTimeout(checkBriefRunning, 10000);
  } else {
    if (prog) prog.style.width = '0%';
  }
}

// 把后端返回的 curve 转成 JS 断点数组，没有则用默认
function _getCurvePoints(dimKey, serverCurve) {
  if (serverCurve && serverCurve.points && serverCurve.points.length >= 2) {
    return serverCurve.points;
  }
  var def = _DEFAULT_CURVES[dimKey];
  return def ? def.map(function(p){ return [p[0], p[1]]; }) : [[0,0],[100,100]];
}

function addCurvePoint(btn, key) {
  var tbl = document.getElementById('curve-tbl-' + key);
  if (!tbl) return;
  // 取最后一行断点的值作为参考
  var rows = tbl.querySelectorAll('tr');
  var lastVal = 100, lastScore = 100;
  for (var i = rows.length - 1; i >= 0; i--) {
    var inputs = rows[i].querySelectorAll('input[type=number]');
    if (inputs.length >= 2) {
      lastVal = parseFloat(inputs[0].value) + 10;
      lastScore = parseFloat(inputs[1].value);
      break;
    }
  }
  var newRow = document.createElement('tr');
  newRow.innerHTML = '<td style="padding:2px 4px;"><input type="number" step="any" value="' + lastVal + '" style="width:70px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:3px;color:#e0e0e0;padding:2px 4px;font-family:Consolas;font-size:11px;" onchange="markDimsDirty()"> →</td>'

  markDimsDirty();
}

  const dims = [];
  rows.forEach(function(row) {
    var cb = row.querySelector('input[type=checkbox]');
    if (!cb) return; // 跳过分类标题行
    var num = row.querySelector('input[type=number]');
    var key = row.querySelector('td:nth-child(2) span').textContent;
    var name = row.querySelector('td:nth-child(2)').textContent.replace(key,'').trim();
    if (name.endsWith('\n')) name = name.slice(0,-1).trim();
    const desc = row.querySelectorAll('td')[3].textContent;
    var curvePoints = null;
    var curveRow = row.nextElementSibling;
    if (curveRow && curveRow.classList.contains('curve-edit-row')) {
      var inpRows = curveRow.querySelectorAll('table tr');
      var pts = [];
      for (var j = 0; j < inpRows.length; j++) {
        var inputs = inpRows[j].querySelectorAll('input[type=number]');
        if (inputs.length >= 2) {
          var x = parseFloat(inputs[0].value);
          var y = parseFloat(inputs[1].value);
          if (!isNaN(x) && !isNaN(y)) pts.push([x, y]);
        }
      }
      if (pts.length >= 2) curvePoints = {points: pts};
    }
    var cat = DIM_INFO[key]?.cat || '';
    dims.push({name: name, key: key, weight: parseInt(num.value) / 100, enabled: cb.checked, desc: desc, curve: curvePoints, category: cat});
  });
  try {
    const controller = new AbortController();
    const timeout = setTimeout(function() { controller.abort(); }, 30000);
    const r = await fetch(API + '/api/dims', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({dims: dims}),
      signal: controller.signal,
    });
    clearTimeout(timeout);
    const d = await r.json();
    if (d.ok) {
      showMsg('✔ 权重已保存', 'ok');
      try { loadDims(); } catch(e) {}
      _watchRecommend();
      _watchSaveProgress();
    } else {
      if (prog) { prog.classList.remove('pulse'); prog.style.width = '0%'; }
      if (btn) { btn.disabled = false; btn.textContent = '💾 保存权重'; btn.style.background = 'linear-gradient(135deg,#66bb6a,#43a047)'; }
      showMsg('✖ ' + (d.error || '保存失败'), 'fail');
    }
  } catch(e) {
    if (prog) { prog.classList.remove('pulse'); prog.style.width = '0%'; }
    if (btn) { btn.disabled = false; btn.textContent = '💾 保存权重'; btn.style.background = 'linear-gradient(135deg,#66bb6a,#43a047)'; }
    showMsg('✖ 保存失败' + (e.name === 'AbortError' ? '（超时）' : ''), 'fail');
  }
}

/** 轮询推荐心跳（不发起 POST，用于保存后追踪连锁推荐进度） */
function _watchRecommend() {
  const btn = document.getElementById('recBtn2');
  const prog = document.getElementById('recProgress');
  if (btn) { btn.disabled = true; }
  const startTime = Date.now();
  const MAX_WAIT = 1800000;
  const poll = setInterval(async () => {
    try {
      const hb = await fetch(API + '/api/heartbeat').then(r => r.json());
      const data = hb.heartbeats?.fund_recommend;
      const alive = hb.alive?.fund_recommend;
      if (data?.total > 0) {
        const pct = Math.round(data.progress / data.total * 100);
        if (btn) btn.textContent = `⏳ 推荐 ${data.status||''} ${pct}%`;
        if (prog) prog.style.width = pct + '%';
      } else if (alive) {
        if (btn) btn.textContent = `⏳ 推荐 ${data?.status||'启动中'}`;
        if (prog) prog.style.width = '5%';
      }
      if (!alive) {
        clearInterval(poll);
        loadFeatures();
        loadBriefing();
        if (btn) { btn.disabled = false; btn.textContent = '▶ 运行推荐'; }
        if (prog) prog.style.width = '0%';
        showMsg('✔ 推荐完成', 'ok');
      }
    } catch(e) {}
    if (Date.now() - startTime > MAX_WAIT) {
      clearInterval(poll);
      if (btn) { btn.disabled = false; btn.textContent = '▶ 运行推荐'; }
      if (prog) prog.style.width = '0%';
      showMsg('推荐超时', 'fail');
    }
  }, 3000);
}

function _watchSaveProgress() {
  var area = document.getElementById("saveProgressArea");
  var fill = document.getElementById("saveProgressFill");
  var pctEl = document.getElementById("saveProgressPct");
  var txtEl = document.getElementById("saveProgressText");
  var saveBtn = document.getElementById("dimsSaveBtn");
  if (!area) return;
  area.style.display = "block";
  fill.style.width = "0%";
  pctEl.textContent = "0%";
  txtEl.textContent = "初始化...";
  var startTime = Date.now();
  var MAX_WAIT = 600000; // 10min
  var briefDone = false;
  var recEverAlive = false;
  var poll = setInterval(async function() {
    try {
      var hb = await fetch(API + "/api/heartbeat").then(function(r){ return r.json(); });
      var recData = hb.heartbeats && hb.heartbeats.fund_recommend;
      var recAlive = hb.alive && hb.alive.fund_recommend;
      var briefData = hb.heartbeats && hb.heartbeats.fund_briefing;
      var briefAlive = hb.alive && hb.alive.fund_briefing;

      if (Date.now() - startTime > MAX_WAIT) {
        clearInterval(poll);
        fill.style.width = "100%";
        pctEl.textContent = "100%";
        txtEl.textContent = "✔ 完成（超时）";
        if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = "💾 保存权重"; saveBtn.style.background = "linear-gradient(135deg,#66bb6a,#43a047)"; }
        return;
      }
      if (recAlive) recEverAlive = true;
      if (recAlive && recData) {
        var pct = recData.total > 0 ? Math.round(recData.progress / recData.total * 100) : 0;
        fill.style.width = pct + "%";
        pctEl.textContent = pct + "%";
        txtEl.textContent = "\u26a1 \u5168\u5e02\u573a\u4f18\u9009 " + recData.progress + "/" + recData.total + "\uff1a" + (recData.status || "");
        if (saveBtn) saveBtn.textContent = "\u23f3 \u63a8\u8350\u4e2d " + pct + "%";
      } else if (briefAlive && briefData) {
        if (!briefDone) {
          briefDone = true;
          txtEl.textContent = "\u2714 \u63a8\u8350\u5df2\u5b8c\u6210\uff0c\u6b63\u5728\u751f\u6210\u665a\u62a5...";
          fill.style.width = "100%";
          pctEl.textContent = "100%";
          if (saveBtn) saveBtn.textContent = "\u23f3 \u751f\u6210\u665a\u62a5...";
        }
        var bpct = briefData.total > 0 ? Math.round(briefData.progress / briefData.total * 100) : 0;
        txtEl.textContent = "\u26a1 \u665a\u62a5\u751f\u6210 " + briefData.progress + "/" + briefData.total + "\uff1a" + (briefData.status || "");
        fill.style.width = Math.max(parseInt(fill.style.width) || 0, bpct) + "%";
        pctEl.textContent = Math.max(parseInt(pctEl.textContent) || 0, bpct) + "%";
      } else if (!recAlive && !briefAlive) {
        // 从未见过心跳且超过30秒 → 按完成处理
        if (!recEverAlive && Date.now() - startTime < 30000) return;
        clearInterval(poll);
        fill.style.width = "100%";
        pctEl.textContent = "100%";
        txtEl.textContent = "\u2714 \u6743\u91cd\u5df2\u4fdd\u5b58\uff0c\u63a8\u8350+\u665a\u62a5\u5df2\u5b8c\u6210";
        setTimeout(function() {
          area.style.display = "none";
        }, 5000);
      }
    } catch(e) {}
  }, 2000);
}

function showScoreDetail(items) {
  var html = '<div style="background:#1a1a1a;border:1px solid #333;border-radius:8px;padding:16px;margin:8px 0;font-size:12px;color:#ccc;">'
    + '<div style="font-size:13px;font-weight:600;color:#e0e0e0;margin-bottom:10px;">\u7ef4\u5ea6\u8bc4\u5206\u660e\u7ec6</div>'
    + '<table style="width:100%;border-collapse:collapse;">'
    + '<thead><tr style="background:#2a2a2a;"><th style="padding:4px 6px;text-align:left;color:#888;border-bottom:1px solid #444;">\u7ef4\u5ea6</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u503c</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u5f97\u5206</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u6743\u91cd</th>'
    + '<th style="padding:4px 6px;text-align:right;color:#888;border-bottom:1px solid #444;">\u8d21\u732e</th></tr></thead><tbody>';
  var total = 0, weightSum = 0;
  items.forEach(function(item){
    var name = item[0], score = item[1], weight = item[2], value = item[3];
    if (value === null || value === undefined) {
      html += '<tr><td style="padding:3px 6px;border-bottom:1px solid #333;color:#888;">' + name + '</td>'
        + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#555;">-</td>'
        + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#ffa726;">50.0</td>'
        + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + (weight * 100).toFixed(0) + '%</td>'
        + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + (score * weight).toFixed(1) + '</td></tr>';
      total += score * weight;
      weightSum += weight;
      return;
    }
    var contrib = (score * weight).toFixed(1);
    total += score * weight;
    weightSum += weight;
    var valStr = value !== null && value !== undefined ? value : '-';
    if (typeof valStr === 'number') valStr = valStr.toFixed(2);
    html += '<tr><td style="padding:3px 6px;border-bottom:1px solid #333;color:#e0e0e0;">' + name + '</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + valStr + '</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:' + (score >= 80 ? '#66bb6a' : score >= 40 ? '#ffa726' : '#ef5350') + ';">' + score.toFixed(1) + '</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + (weight * 100).toFixed(0) + '%</td>'
      + '<td style="padding:3px 6px;text-align:right;border-bottom:1px solid #333;font-family:Consolas;color:#888;">' + contrib + '</td></tr>';
  });
  var normTotal = weightSum > 0 ? (total / weightSum).toFixed(1) : '0.0';
  html += '<tr><td style="padding:4px 6px;border-top:1px solid #555;color:#888;" colspan="2">\u5408\u8ba1</td>'
    + '<td style="padding:4px 6px;text-align:right;border-top:1px solid #555;font-family:Consolas;font-weight:600;color:#66bb6a;">' + normTotal + '</td>'
    + '<td style="padding:4px 6px;text-align:right;border-top:1px solid #555;font-family:Consolas;color:#888;">' + (weightSum * 100).toFixed(0) + '%</td>'
    + '<td style="padding:4px 6px;text-align:right;border-top:1px solid #555;font-family:Consolas;color:#888;">' + total.toFixed(1) + '</td></tr>'
    + '</tbody></table>'
    + '<button id="__closeScoreBtn" style="margin-top:10px;background:#333;border:1px solid #555;border-radius:4px;color:#ccc;padding:4px 12px;cursor:pointer;">\u5173\u95ed</button></div>';
  var el = document.getElementById("scoreDetailModal");
  if (!el) {
    el = document.createElement("div");
    el.id = "scoreDetailModal";
    document.body.appendChild(el);
  }
  el.innerHTML = html;
  var btn = document.getElementById("__closeScoreBtn");
  if (btn) btn.onclick = function(){ el.style.display = "none"; };
  el.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;max-width:500px;width:90%;";
}
